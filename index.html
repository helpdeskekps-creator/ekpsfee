<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  #ekps-root, #ekps-root * { box-sizing: border-box; }
  #ekps-root {
    --ink:#1B2A4A;
    --ink-2:#28395C;
    --paper:#F4F1E9;
    --card:#FFFFFF;
    --saffron:#E8A33D;
    --saffron-dark:#C9821F;
    --slate:#5B6B82;
    --green:#2F8F5B;
    --green-bg:#E7F4EC;
    --rust:#C1502E;
    --rust-bg:#FBEAE4;
    --amber:#B9862A;
    --amber-bg:#FBF1DC;
    --border:#E4E0D3;
    --border-strong:#D6D0BF;
    --shadow: 0 1px 2px rgba(27,42,74,0.06), 0 8px 24px -12px rgba(27,42,74,0.18);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    position: relative;
    isolation: isolate;
  }
  #ekps-root .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  #ekps-root .disp { font-family: 'Sora', ui-sans-serif, sans-serif; }

  /* ---------- Sidebar ---------- */
  #ekps-root .sidebar {
    width: 236px;
    flex-shrink: 0;
    background: linear-gradient(185deg, var(--ink) 0%, #16233F 100%);
    color: #EAEDF4;
    display: flex;
    flex-direction: column;
    padding: 22px 16px;
    min-height: 100vh;
    position: sticky;
    top: 0;
  }
  #ekps-root .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 20px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 18px;
  }
  #ekps-root .brand-badge {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--saffron);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora'; font-weight: 800; color: var(--ink); font-size: 15px;
    flex-shrink: 0;
  }
  #ekps-root .brand-name { font-family:'Sora'; font-weight: 700; font-size: 13.5px; line-height: 1.25; }
  #ekps-root .brand-sub { font-size: 10.5px; color: #A9B4CB; letter-spacing: .04em; text-transform: uppercase; margin-top: 1px; }

  nav.navlist { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
  #ekps-root .navitem {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    color: #C7CFE0; font-size: 13.5px; font-weight: 500;
    transition: background .15s, color .15s;
    user-select: none;
  }
  #ekps-root .navitem:hover { background: rgba(255,255,255,0.06); color: #fff; }
  #ekps-root .navitem.active { background: rgba(232,163,61,0.16); color: #fff; }
  #ekps-root .navitem.active .navicon { color: var(--saffron); }
  #ekps-root .navicon { width: 17px; height: 17px; flex-shrink: 0; color: #8D98B3; }
  #ekps-root .navitem.active .navicon, #ekps-root .navitem:hover .navicon { color: var(--saffron); }

  #ekps-root .sidebar-foot {
    margin-top: auto; padding: 12px 10px 2px 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 10.5px; color: #8D98B3; line-height: 1.5;
  }

  /* ---------- Main ---------- */
  #ekps-root .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #ekps-root .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    background: rgba(244,241,233,0.85); backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  #ekps-root .topbar h1 { font-family:'Sora'; font-size: 19px; font-weight: 700; margin: 0; }
  #ekps-root .topbar .sub { font-size: 12px; color: var(--slate); margin-top: 2px; }
  #ekps-root .topbar-right { display:flex; align-items:center; gap: 14px; font-size: 12px; color: var(--slate); }
  #ekps-root .content { padding: 24px 28px 60px 28px; }

  #ekps-root .btn {
    font-family: 'Inter'; font-weight: 600; font-size: 13px;
    padding: 9px 16px; border-radius: 8px; border: 1px solid transparent;
    cursor: pointer; display:inline-flex; align-items:center; gap: 7px;
    transition: transform .06s ease, box-shadow .15s;
  }
  #ekps-root .btn:active { transform: translateY(1px); }
  #ekps-root .btn-primary { background: var(--ink); color:#fff; }
  #ekps-root .btn-primary:hover { background: var(--ink-2); }
  #ekps-root .btn-accent { background: var(--saffron); color: var(--ink); }
  #ekps-accent:hover { background: var(--saffron-dark); color: #fff; }
  #ekps-root .btn-ghost { background: transparent; border-color: var(--border-strong); color: var(--ink); }
  #ekps-root .btn-ghost:hover { background: #fff; }
  #ekps-root .btn-sm { padding: 6px 11px; font-size: 12px; }
  #ekps-root .btn-danger { background: transparent; color: var(--rust); border-color: #EAD0C6; }
  #ekps-root .btn-danger:hover { background: var(--rust-bg); }
  #ekps-root .btn:disabled { opacity:.45; cursor:not-allowed; }

  /* ---------- Cards / KPIs ---------- */
  #ekps-root .kpi-grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
  #ekps-root .kpi-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow:hidden;
  }
  #ekps-root .kpi-card::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--accent, var(--saffron));
  }
  #ekps-root .kpi-label { font-size: 11.5px; color: var(--slate); text-transform: uppercase; letter-spacing: .05em; font-weight:600; }
  #ekps-root .kpi-value { font-family:'Sora'; font-weight: 700; font-size: 25px; margin-top: 6px; }
  #ekps-root .kpi-note { font-size: 11px; color: var(--slate); margin-top: 4px; }

  #ekps-root .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
  #ekps-root .panel-head { display:flex; align-items:center; justify-content:space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  #ekps-root .panel-head h3 { font-family:'Sora'; font-size:14.5px; margin:0; font-weight:700; }
  #ekps-root .panel-body { padding: 16px 18px; }

  #ekps-root .two-col { display:grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items:start; }

  /* class bars */
  #ekps-root .classbar-row { display:flex; align-items:center; gap: 10px; padding: 7px 0; }
  #ekps-root .classbar-label { width: 46px; font-size: 12px; font-weight:600; color: var(--ink); flex-shrink:0; }
  #ekps-root .classbar-track { flex:1; height: 9px; background:#EFEBDF; border-radius: 5px; overflow:hidden; }
  #ekps-root .classbar-fill { height:100%; background: linear-gradient(90deg, var(--saffron), var(--saffron-dark)); border-radius: 5px; }
  #ekps-root .classbar-val { width: 84px; text-align:right; font-size: 11.5px; font-family:'IBM Plex Mono'; color: var(--slate); flex-shrink:0; }

  /* recent list */
  #ekps-root .recent-row { display:flex; align-items:center; justify-content:space-between; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size:13px; }
  #ekps-root .recent-row:last-child { border-bottom:none; }
  #ekps-root .recent-name { font-weight:600; }
  #ekps-root .recent-meta { font-size:11.5px; color:var(--slate); }
  #ekps-root .recent-amt { font-family:'IBM Plex Mono'; font-weight:600; color: var(--green); }

  /* ---------- Forms ---------- */
  #ekps-root .field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  #ekps-root .field label { font-size:11.5px; font-weight:600; color: var(--slate); text-transform:uppercase; letter-spacing:.03em; }
  #ekps-root .field input, #ekps-root .field select {
    font-family:'Inter'; font-size: 13.5px; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--border-strong); background:#fff; color: var(--ink); outline:none;
  }
  #ekps-root .field input:focus, #ekps-root .field select:focus { border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(232,163,61,0.18); }
  #ekps-root .field .hint { font-size: 11px; color: var(--slate); }
  #ekps-root .form-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 0 16px; }
  #ekps-root .form-grid.cols-4 { grid-template-columns: repeat(4,1fr); }

  #ekps-root .pick-preview {
    margin-top: -4px; margin-bottom: 14px; padding: 10px 12px; border-radius: 8px;
    background: var(--paper); border: 1px dashed var(--border-strong); font-size: 12.5px; color: var(--ink);
    display:none;
  }
  #ekps-root .pick-preview.show { display:block; }
  #ekps-root .pick-preview b { font-weight:700; }

  /* ---------- Tables ---------- */
  #ekps-root table.data { width:100%; border-collapse: collapse; font-size: 13px; }
  #ekps-root table.data thead th {
    text-align:left; font-size: 11px; text-transform:uppercase; letter-spacing:.04em;
    color: var(--slate); font-weight:700; padding: 9px 10px; border-bottom: 1px solid var(--border-strong);
    background: #FBFAF6; position: sticky; top:0;
  }
  #ekps-root table.data tbody td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  #ekps-root table.data tbody tr:hover { background: #FCFAF3; }
  #ekps-root table.data tbody tr.detail-row { background: #FBFAF6; }
  #ekps-root table.data tbody tr.detail-row:hover { background: #FBFAF6; }
  #ekps-root .id-chip { font-family:'IBM Plex Mono'; font-size:11.5px; background:#EFEBDD; border-radius:5px; padding:2px 6px; color:var(--ink-2); }
  #ekps-root .cls-chip { font-size:11px; font-weight:600; color: var(--ink-2); background:#EDE9F5; border-radius:5px; padding:2px 7px; }

  #ekps-root .status-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block; letter-spacing:.02em; }
  #ekps-root .status-Paid { background: var(--green-bg); color: var(--green); }
  #ekps-root .status-Partial { background: var(--amber-bg); color: var(--amber); }
  #ekps-root .status-Due { background: var(--rust-bg); color: var(--rust); }

  #ekps-root .row-actions { display:flex; gap:6px; }
  #ekps-root .icon-btn {
    width: 28px; height:28px; border-radius:7px; border:1px solid var(--border-strong); background:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color: var(--slate);
  }
  #ekps-root .icon-btn:hover { background: var(--paper); color: var(--ink); }
  #ekps-root .icon-btn svg { width:14px; height:14px; }

  #ekps-root .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  #ekps-root .toolbar input[type=text], #ekps-root .toolbar select {
    font-family:'Inter'; font-size:13px; padding: 8px 11px; border-radius:8px; border:1px solid var(--border-strong); background:#fff;
  }
  #ekps-root .toolbar .search-wrap { position:relative; flex:1; min-width:200px; max-width:320px; }
  #ekps-root .toolbar .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--slate); }
  #ekps-root .toolbar .search-wrap input { padding-left: 30px; width:100%; }

  #ekps-root .empty-state { text-align:center; padding: 46px 20px; color: var(--slate); }
  #ekps-root .empty-state .disp { font-size:15px; color: var(--ink); margin-bottom:4px; }

  #ekps-root .month-grid { display:grid; grid-template-columns: repeat(6,1fr); gap:6px; padding: 12px 10px 14px 40px; }
  #ekps-root .month-cell { border-radius:7px; padding:7px 8px; font-size:11px; background:#fff; border:1px solid var(--border); }
  #ekps-root .month-cell .m { color:var(--slate); font-weight:600; text-transform:uppercase; font-size:9.5px; letter-spacing:.03em; }
  #ekps-root .month-cell .v { font-family:'IBM Plex Mono'; font-weight:700; margin-top:2px; }
  #ekps-root .month-cell.paid { background: var(--green-bg); border-color:#CFE9D9; }
  #ekps-root .month-cell.paid .v { color: var(--green); }

  #ekps-root .toast {
    position: fixed; bottom: 22px; right: 22px; background: var(--ink); color:#fff;
    padding: 12px 18px; border-radius: 9px; font-size:13px; box-shadow: var(--shadow);
    display:flex; align-items:center; gap:9px; z-index: 60; opacity:0; transform: translateY(8px);
    transition: opacity .25s, transform .25s; pointer-events:none;
  }
  #ekps-root .toast.show { opacity:1; transform:translateY(0); }
  #ekps-root .toast .dot { width:7px; height:7px; border-radius:50%; background: var(--saffron); }

  #ekps-root .modal-backdrop {
    position: fixed; inset:0; background: rgba(20,28,46,0.45); z-index: 50;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  #ekps-root .modal {
    background:#fff; border-radius: 14px; width: 560px; max-width:100%; max-height: 88vh; overflow:auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  #ekps-root .modal-head { padding: 18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  #ekps-root .modal-head h3 { font-family:'Sora'; margin:0; font-size:16px; }
  #ekps-root .modal-body { padding: 18px 20px; }
  #ekps-root .modal-foot { padding: 14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  /* ---------- Receipt (signature element) ---------- */
  #ekps-root .receipt-wrap { display:flex; justify-content:center; padding: 10px 0 20px 0; }
  #ekps-root .receipt {
    width: 380px; background:#fff; border-radius: 4px; position:relative;
    box-shadow: var(--shadow); padding: 26px 26px 20px 26px;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px);
    background-size: 100% 26px;
    background-position: 0 118px;
  }
  #ekps-root .receipt::before, #ekps-root .receipt::after {
    content:""; position:absolute; width:20px; height:20px; background: var(--paper); border-radius:50%;
    top: 50%; margin-top:-10px;
  }
  #ekps-root .receipt::before { left:-10px; }
  #ekps-root .receipt::after { right:-10px; }
  #ekps-root .receipt-perf {
    position:absolute; left:14px; right:14px; top:50%; margin-top:-1px; border-top: 2px dashed var(--border-strong);
  }
  #ekps-root .receipt-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 14px; }
  #ekps-root .receipt-school { font-family:'Sora'; font-weight:800; font-size:14.5px; line-height:1.25; }
  #ekps-root .receipt-school-sub { font-size:10px; color:var(--slate); margin-top:2px; }
  #ekps-root .receipt-no { font-family:'IBM Plex Mono'; font-size:11px; background:var(--paper); padding:4px 8px; border-radius:5px; }
  #ekps-root .receipt-row { display:flex; justify-content:space-between; font-size:12.5px; padding: 6px 0; }
  #ekps-root .receipt-row .k { color: var(--slate); }
  #ekps-root .receipt-row .v { font-weight:600; text-align:right; }
  #ekps-root .receipt-amt-block { text-align:center; margin: 14px 0 4px 0; }
  #ekps-root .receipt-amt-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--slate); }
  #ekps-root .receipt-amt { font-family:'Sora'; font-weight:800; font-size:26px; color: var(--green); margin-top:2px; }
  #ekps-root .receipt-foot { margin-top: 44px; display:flex; justify-content:space-between; font-size:10.5px; color:var(--slate); }
  #ekps-root .receipt-sign { border-top:1px solid var(--border-strong); padding-top:5px; width:150px; text-align:center; }

  #ekps-root .receipt-picker { display:flex; gap:10px; align-items:flex-end; margin-bottom: 18px; flex-wrap:wrap; }

  #ekps-print-dual { display:none; }
  #ekps-print-dual .copy-tag { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--slate); font-weight:700; margin-bottom:6px; text-align:center; }

  @media print {
    body * { visibility: hidden; }
    #ekps-print-dual, #ekps-print-dual * { visibility: visible; }
    #ekps-print-dual {
      display:block; position: fixed; inset:0; background:#fff;
    }
    #ekps-print-dual .top-half {
      height: 148.5mm; width:100%; box-sizing:border-box; padding: 8mm 10mm;
      display:flex; align-items:stretch; gap: 6mm;
    }
    #ekps-print-dual .copy-col {
      flex:1; min-width:0; box-sizing:border-box; padding: 0 4mm; position:relative;
    }
    #ekps-print-dual .copy-col.second { border-left: 2px dashed #999; }
    #ekps-print-dual .bottom-half { height: 148.5mm; width:100%; }
    @page { size: A4 portrait; margin: 0; }
  }

  @media (max-width: 980px) {
    #ekps-root { flex-direction: column; }
    #ekps-root .sidebar { width:100%; min-height:auto; position:relative; flex-direction:row; align-items:center; overflow-x:auto; }
    #ekps-root .brand { border-bottom:none; margin-bottom:0; padding: 4px 10px; }
    #ekps-root nav.navlist { flex-direction:row; margin-top:0; }
    #ekps-root .sidebar-foot { display:none; }
    #ekps-root .kpi-grid { grid-template-columns: repeat(2,1fr); }
    #ekps-root .two-col { grid-template-columns: 1fr; }
    #ekps-root .form-grid, #ekps-root .form-grid.cols-4 { grid-template-columns: repeat(2,1fr); }
  }

  /* ---------- Session Promotion ---------- */
  #ekps-root .promo-flow { display:flex; align-items:center; gap:12px; font-family:'Sora'; font-weight:700; font-size:15px; }
  #ekps-root .promo-flow .cls-pill { background: var(--ink); color:#fff; padding:6px 14px; border-radius:20px; font-size:13px; }
  #ekps-root .promo-flow .arrow { color: var(--saffron-dark); font-size:18px; }
  #ekps-root .check-row { display:flex; align-items:center; gap:10px; padding:9px 10px; border-bottom:1px dashed var(--border); font-size:13px; }
  #ekps-root .check-row:last-child { border-bottom:none; }
  #ekps-root .check-row input[type=checkbox] { width:16px; height:16px; accent-color: var(--saffron-dark); cursor:pointer; flex-shrink:0; }
  #ekps-root .check-row .cr-name { font-weight:600; flex:1; }
  #ekps-root .check-row .cr-due { font-family:'IBM Plex Mono'; font-size:12px; color: var(--rust); }
  #ekps-root .promo-selectall { display:flex; align-items:center; gap:10px; padding:9px 10px; background:#FBFAF6; border-bottom:1px solid var(--border-strong); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--slate); }
  #ekps-root .promo-selectall input { width:16px; height:16px; accent-color: var(--saffron-dark); cursor:pointer; }

  /* ---------- Exam Manager tabs ---------- */
  #ekps-root .subtabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  #ekps-root .subtab { padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; background:#fff; border:1px solid var(--border-strong); color:var(--slate); }
  #ekps-root .subtab:hover { background: var(--paper); }
  #ekps-root .subtab.active { background: var(--ink); color:#fff; border-color:var(--ink); }

  #ekps-root .photo-upload { display:flex; align-items:center; gap:12px; }
  #ekps-root .photo-preview { width:64px; height:64px; border-radius:8px; background:#EFEBDD; border:1px solid var(--border-strong); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--slate); flex-shrink:0; }
  #ekps-root .photo-preview img { width:100%; height:100%; object-fit:cover; }
  #ekps-root .sign-preview { width:120px; height:56px; border-radius:6px; background:#fff; border:1px dashed var(--border-strong); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--slate); flex-shrink:0; }
  #ekps-root .sign-preview img { width:100%; height:100%; object-fit:contain; }
</style>

<div id="ekps-root">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">EK</div>
      <div style="flex: 1;">
        <div class="brand-name">Education Key<br/>Public School</div>
        <div class="brand-sub">Fee Manager</div>
      </div>
      <div id="ekps-logout-btn" style="cursor: pointer; font-size: 11px; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 5px; display: none;" title="Logout">Logout</div>
    </div>
    <nav class="navlist" id="ekps-nav"></nav>
    <div class="sidebar-foot"><span id="ekps-sync-indicator">Local storage only</span><br/>Academic Year 2026&ndash;27</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="ekps-title">Dashboard</h1>
        <div class="sub" id="ekps-subtitle">Realtime fee collection overview</div>
      </div>
      <div class="topbar-right">
        <span id="ekps-role-badge" style="background: var(--border-strong); padding: 3px 8px; border-radius: 5px; font-weight: 600; text-transform: uppercase; font-size: 11px; color: var(--ink);"></span>
        <span id="ekps-clock" class="mono"></span>
      </div>
    </div>
    <div class="content" id="ekps-content"></div>
  </div>

  <div class="toast" id="ekps-toast"><span class="dot"></span><span id="ekps-toast-text">Saved</span></div>
  <div id="ekps-modal-root"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  const MONTHS = ['April','May','June','July','August','September','October','November','December','January','February','March'];
  const CLASS_ORDER = ['P.NC','N.C','L.K.G','U.K.G','1st','2nd','3rd','4th','5th','6th','7th','8th'];
  const SEED_STUDENTS = [];

  const ICONS = {
    dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
    collect: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><rect x="2.5" y="6" width="19" height="13" rx="2"/><path d="M2.5 10h19"/><circle cx="16.5" cy="14.5" r="1.5"/></svg>',
    students: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 2.9-6.2 6.5-6.2s6.5 2.6 6.5 6.2"/><circle cx="17.3" cy="8.8" r="2.4"/><path d="M15.8 13.9c2.8.4 4.7 2.6 4.7 5.6"/></svg>',
    ledger: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><path d="M5 3h11l3 3v15H5z"/><path d="M16 3v3h3"/><path d="M8.5 11h7M8.5 14.5h7M8.5 18h4"/></svg>',
    receipts: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><path d="M5 3h14v18l-2.5-1.6L14 21l-2-1.6L10 21l-2.5-1.6L5 21z"/><path d="M8.5 8h7M8.5 11.5h7M8.5 15h4"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>',
    print: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="6" y="13" width="12" height="8"/><path d="M6 17H3v-6a1 1 0 011-1h16a1 1 0 011 1v6h-3"/></svg>',
    chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>',
    bill: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l3 3v17l-2.5-1.6L13 22l-2-1.6L9 22l-2.5-1.6L4 22V5a3 3 0 012-3z"/><path d="M8 8h6M8 11.5h6M8 15h3.5"/></svg>',
    backup: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>',
    password: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><circle cx="12" cy="10" r="3"/><path d="M12 2a10 10 0 0110 10c0 5.523-4.477 10-10 10S2 17.523 2 12c0-2.33.796-4.471 2.126-6.174L7 9m7-4l2 2m-5-3.5V6"/></svg>',
    promotion: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/><path d="M5 19h14"/></svg>',
    examcard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="navicon"><rect x="2.5" y="5" width="19" height="14" rx="2.2"/><circle cx="8" cy="11.2" r="2.1"/><path d="M5.3 16.5c.4-1.7 1.7-2.6 2.7-2.6s2.3.9 2.7 2.6"/><path d="M14 9.5h5M14 12.5h5M14 15.5h3"/></svg>'
  };

  let students = [];
  let entries = [];
  let route = 'dashboard';
  let ledgerExpanded = {};
  let ledgerFilters = { cls:'all', status:'all', q:'' };
  let studentQ = '';
  let editingStudentId = null;
  let showStudentModal = false;
  let receiptSelectedId = null;
  let ready = false;
  let autoBackups = [];

  // --- Google Sheet locked sync state ---
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby2kp-czkh2Qs6EC8qPk4ALp4huZ9RtQXiS9hmII2k6JInvbZiOpfwTdbPdeTGjoAY/exec';
  let syncStatus = 'idle'; // idle | syncing | synced | error | offline
  let syncStatusMsg = '';

  // --- Session Promotion state ---
  let promotionFromClass = null;
  let promotionSelected = {};

  // --- Exam Manager state ---
  let schoolSettings = { name:'Education Key Public School', address:'', phone:'', principalName:'', principalSign:'', instructions:['Admit card exam hall me laana anivarya hai.','Mobile phone allowed nahi hai.'] };
  let exams = [];
  let examSubView = 'settings';
  let examSelectedId = null;
  let admitClassFilter = 'all';
  let admitSelected = {};

  // --- Auth state variables ---
  let currentUserRole = null; 
  let authData = {
    admin: 'admin123',
    user: 'user123'
  };

  const root = document.getElementById('ekps-root');
  const contentEl = document.getElementById('ekps-content');
  const navEl = document.getElementById('ekps-nav');
  const titleEl = document.getElementById('ekps-title');
  const subEl = document.getElementById('ekps-subtitle');
  const modalRoot = document.getElementById('ekps-modal-root');

  function fmt(n){ n = Math.round(n||0); return '₹' + n.toLocaleString('en-IN'); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function todayISO(){ const d = new Date(); return d.toISOString().slice(0,10); }
  function fmtDate(iso){ if(!iso) return '—'; const d = new Date(iso+'T00:00:00'); if(isNaN(d)) return iso;
    return d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}); }

  const BILL_TYPES = ['Uniform','Books / Copy','Van / Transport','Annual Charge','Exam Fee','Late Fee','Activity / Picnic','Other'];
  function billsTotal(s){ return Array.isArray(s.bills) ? s.bills.reduce((a,b)=>a+(parseFloat(b.amount)||0),0) : 0; }
  function totalDue(s){ return (s.monthlyFee*12) + s.examFee + s.oldDue + s.uniformBill + s.bookBill + s.otherBill + billsTotal(s); }
  function studentEntries(id){ return entries.filter(e => e.studentId === id); }
  function totalPaid(id){ return studentEntries(id).reduce((a,e)=>a+e.amount,0); }
  function monthPaid(id, month){ return studentEntries(id).filter(e=>e.month===month).reduce((a,e)=>a+e.amount,0); }
  function statusOf(s){
    const due = totalDue(s), paid = totalPaid(s.id), rest = due - paid;
    if (rest <= 0) return 'Paid';
    if (paid <= 0) return 'Due';
    return 'Partial';
  }
  function nextStudentId(){ return students.length ? Math.max(...students.map(s=>s.id))+1 : 1; }
  function nextReceiptNo(){ const n = entries.length+1; return 'EK-' + String(n).padStart(4,'0'); }
  function nextClassOf(cls){
    const i = CLASS_ORDER.indexOf(cls);
    if (i===-1) return null;
    if (i===CLASS_ORDER.length-1) return 'Passed Out';
    return CLASS_ORDER[i+1];
  }

  // ---------- Google Sheet sync (Apps Script Web App bridge) ----------
  function setSyncStatus(status, msg){
    syncStatus = status; syncStatusMsg = msg || '';
    const el = document.getElementById('ekps-sync-indicator');
    if (el) el.outerHTML = syncIndicatorHtml();
  }
  function syncIndicatorHtml(){
    const map = {
      idle: ['#9AA5B8', 'Google Sheet Connected'],
      syncing: ['#B9862A', 'Google Sheet se sync ho raha hai&hellip;'],
      synced: ['#2F8F5B', 'Google Sheet se sync&nbsp;✓'],
      error: ['#C1502E', 'Sync fail — ' + esc(syncStatusMsg || 'connection error')],
      offline: ['#C1502E', 'Offline — localStorage se data dikh raha hai']
    };
    const [color, label] = map[syncStatus] || map.idle;
    return `<span id="ekps-sync-indicator" style="display:inline-flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;"></span>${label}</span>`;
  }
  function gasConfigured(){ return !!(GAS_URL && GAS_URL.trim()); }
  function gsRequestGetAll(){
    return fetch(GAS_URL + (GAS_URL.includes('?') ? '&' : '?') + 'action=get', { method:'GET' })
      .then(r=>r.json());
  }
  function gsRequestSet(key, value){
    return fetch(GAS_URL, {
      method:'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify({ action:'set', key, value: JSON.stringify(value) })
    }).then(r=>r.json());
  }
  function pushToSheet(key, value){
    if (!gasConfigured()) return;
    setSyncStatus('syncing');
    gsRequestSet(key, value).then(res=>{
      if (res && res.ok) setSyncStatus('synced');
      else setSyncStatus('error', (res && res.error) || 'unknown');
    }).catch(err=>{ setSyncStatus('error', err.message || 'network error'); });
  }

  // ---------- data load / save ----------
  function loadData(){
    try {
      const r = localStorage.getItem('ekps_students');
      students = r ? JSON.parse(r) : SEED_STUDENTS.slice();
    } catch(e){ students = SEED_STUDENTS.slice(); }
    students.forEach(s=>{ if (!Array.isArray(s.bills)) s.bills = []; if (typeof s.mobNo !== 'string') s.mobNo = s.mobNo ? String(s.mobNo) : ''; });
    
    try {
      const r = localStorage.getItem('ekps_entries');
      entries = r ? JSON.parse(r) : [];
    } catch(e){ entries = []; }
    
    try {
      const r = localStorage.getItem('ekps_autobackups');
      autoBackups = r ? JSON.parse(r) : [];
    } catch(e){ autoBackups = []; }
    
    try {
      const authStorage = localStorage.getItem('ekps_auth');
      if(authStorage) authData = JSON.parse(authStorage);
    } catch(e){}
    
    try {
      const session = localStorage.getItem('ekps_session');
      if(session) currentUserRole = session;
    } catch(e){}

    try {
      const r = localStorage.getItem('ekps_school_settings');
      if (r) schoolSettings = Object.assign({}, schoolSettings, JSON.parse(r));
    } catch(e){}

    try {
      const r = localStorage.getItem('ekps_exams');
      exams = r ? JSON.parse(r) : [];
    } catch(e){ exams = []; }

    ready = true;

    if (gasConfigured()){
      setSyncStatus('syncing');
      gsRequestGetAll().then(res=>{
        if (!res || !res.ok || !res.data) { setSyncStatus('error', 'bad response'); return; }
        const d = res.data;
        try { if (d.students) { students = JSON.parse(d.students); students.forEach(s=>{ if (!Array.isArray(s.bills)) s.bills = []; if (typeof s.mobNo !== 'string') s.mobNo = s.mobNo ? String(s.mobNo) : ''; }); } } catch(e){}
        try { if (d.entries) entries = JSON.parse(d.entries); } catch(e){}
        try { if (d.exams) exams = JSON.parse(d.exams); } catch(e){}
        try { if (d.schoolSettings) schoolSettings = Object.assign({}, schoolSettings, JSON.parse(d.schoolSettings)); } catch(e){}
        cacheLocally();
        setSyncStatus('synced');
        render();
      }).catch(err=>{
        setSyncStatus('offline', err.message || 'network error');
        toast('Google Sheet se connect nahi ho paya — offline data dikh raha hai');
      });
    }
  }
  function cacheLocally(){
    try { localStorage.setItem('ekps_students', JSON.stringify(students)); } catch(e){}
    try { localStorage.setItem('ekps_entries', JSON.stringify(entries)); } catch(e){}
    try { localStorage.setItem('ekps_exams', JSON.stringify(exams)); } catch(e){}
    try { localStorage.setItem('ekps_school_settings', JSON.stringify(schoolSettings)); } catch(e){}
  }
  function saveSchoolSettings(){
    try { localStorage.setItem('ekps_school_settings', JSON.stringify(schoolSettings)); }
    catch(e){ console.error('save school settings failed', e); }
    pushToSheet('schoolSettings', schoolSettings);
  }
  function saveExams(){
    try { localStorage.setItem('ekps_exams', JSON.stringify(exams)); }
    catch(e){ console.error('save exams failed', e); }
    pushToSheet('exams', exams);
  }
  
  function saveStudents(){
    try { localStorage.setItem('ekps_students', JSON.stringify(students)); }
    catch(e){ console.error('save students failed', e); }
    pushToSheet('students', students);
    maybeAutoBackup();
  }
  function saveEntries(){
    try { localStorage.setItem('ekps_entries', JSON.stringify(entries)); }
    catch(e){ console.error('save entries failed', e); }
    pushToSheet('entries', entries);
    maybeAutoBackup();
  }
  function saveAuth(){
    try { localStorage.setItem('ekps_auth', JSON.stringify(authData)); } catch(e){}
  }

  // ---------- auto backup ----------
  const AUTO_BACKUP_MIN_GAP_MS = 3 * 60 * 1000; 
  const AUTO_BACKUP_KEEP = 5;
  function saveAutoBackups(){
    try { localStorage.setItem('ekps_autobackups', JSON.stringify(autoBackups)); }
    catch(e){ console.error('save autobackups failed', e); }
  }
  function snapshotNow(){
    autoBackups.push({
      ts: Date.now(),
      students: JSON.parse(JSON.stringify(students)),
      entries: JSON.parse(JSON.stringify(entries)),
    });
    if (autoBackups.length > AUTO_BACKUP_KEEP) autoBackups = autoBackups.slice(-AUTO_BACKUP_KEEP);
    saveAutoBackups();
  }
  function maybeAutoBackup(){
    if (!ready) return;
    const last = autoBackups.length ? autoBackups[autoBackups.length-1].ts : 0;
    if (Date.now() - last < AUTO_BACKUP_MIN_GAP_MS) return;
    snapshotNow();
  }
  setInterval(()=>{ if (ready) maybeAutoBackup(); }, 5 * 60 * 1000);

  function toast(msg){
    const t = document.getElementById('ekps-toast');
    document.getElementById('ekps-toast-text').textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
  }

  // ---------- AUTH PAGES / MODALS ----------
  function renderLoginView(){
    contentEl.innerHTML = `
      <div style="display: flex; justify-content: center; align-items: center; padding: 40px 0;">
        <div class="panel" style="width: 400px; max-width: 100%;">
          <div class="panel-head" style="justify-content: center;">
            <h3 style="font-size: 16px;">🔐 Fee Manager Secure Login</h3>
          </div>
          <div class="panel-body">
            <div class="field">
              <label>Select Role / Username</label>
              <select id="login-role">
                <option value="admin">Admin (Full Control)</option>
                <option value="user">User (Collection & Ledger Only)</option>
              </select>
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="login-pass" placeholder="Enter password..."/>
              <div class="hint">Default passwords are admin123 and user123</div>
            </div>
            <button class="btn btn-primary" id="login-submit-btn" style="width: 100%; justify-content: center; margin-top: 10px;">Login</button>
          </div>
        </div>
      </div>`;
    
    titleEl.textContent = "Authentication Required";
    subEl.textContent = "Please verify your credentials to access application parameters.";
    document.getElementById('ekps-logout-btn').style.display = 'none';
    document.getElementById('ekps-role-badge').style.display = 'none';
    navEl.innerHTML = '';

    document.getElementById('login-submit-btn').addEventListener('click', () => {
      const role = document.getElementById('login-role').value;
      const pass = document.getElementById('login-pass').value;
      if(authData[role] === pass){
        currentUserRole = role;
        localStorage.setItem('ekps_session', role);
        toast('Login Successful as ' + role);
        route = 'dashboard';
        render();
      } else {
        toast('Incorrect Password! Kripya sahi password dalein.');
      }
    });
  }

  function passwordManagementModal(){
    const isAdmin = currentUserRole === 'admin';
    modalRoot.innerHTML = `
      <div class="modal-backdrop" id="ekps-pass-bg">
        <div class="modal" style="width: 420px;">
          <div class="modal-head"><h3>🔐 Manage Passwords</h3><div class="icon-btn" id="ekps-pass-close">✕</div></div>
          <div class="modal-body">
            <h4 style="margin: 0 0 12px 0; font-size: 13px; color: var(--ink-2);">Change Your Current Password</h4>
            <div class="field">
              <label>New Password</label>
              <input type="password" id="p-new" placeholder="Enter new password"/>
            </div>
            <div class="field">
              <label>Confirm New Password</label>
              <input type="password" id="p-conf" placeholder="Re-type new password"/>
            </div>
            <button class="btn btn-accent btn-sm" id="ekps-change-own-pass" style="width:100%; justify-content:center;">Update My Password</button>
            
            ${isAdmin ? `
              <div style="margin-top: 20px; border-top: 1px dashed var(--border-strong); padding-top: 16px;">
                <h4 style="margin: 0 0 12px 0; font-size: 13px; color: var(--rust);">Admin Controls: Reset User Password</h4>
                <div class="field">
                  <label>Set Staff/User Password</label>
                  <input type="password" id="p-user-reset" placeholder="Enter new password for standard User"/>
                </div>
                <button class="btn btn-primary btn-sm" id="ekps-reset-user-pass" style="width:100%; justify-content:center;">Reset User Password</button>
              </div>
            ` : ''}
          </div>
          <div class="modal-foot">
            <span class="btn btn-ghost" id="ekps-pass-cancel">Close</span>
          </div>
        </div>
      </div>`;

    const close = ()=>{ modalRoot.innerHTML=''; };
    document.getElementById('ekps-pass-bg').addEventListener('click', e=>{ if(e.target.id==='ekps-pass-bg') close(); });
    document.getElementById('ekps-pass-close').addEventListener('click', close);
    document.getElementById('ekps-pass-cancel').addEventListener('click', close);
    
    document.getElementById('ekps-change-own-pass').addEventListener('click', ()=>{
      const n = document.getElementById('p-new').value.trim();
      const c = document.getElementById('p-conf').value.trim();
      if(!n){ toast('Password khali nahi ho sakta'); return; }
      if(n !== c){ toast('Passwords match nahi ho rahe'); return; }
      authData[currentUserRole] = n;
      saveAuth();
      toast('Aapka Password update ho gaya hai');
      close();
    });

    if(isAdmin){
      document.getElementById('ekps-reset-user-pass').addEventListener('click', ()=>{
        const up = document.getElementById('p-user-reset').value.trim();
        if(!up){ toast('User password dalein'); return; }
        authData['user'] = up;
        saveAuth();
        toast('Staff/User password reset ho gaya');
        close();
      });
    }
  }

  // ---------- nav ----------
  const NAV = [
    {id:'dashboard', label:'Dashboard', icon:'dashboard', roles:['admin', 'user']},
    {id:'collect', label:'Fee Collection', icon:'collect', roles:['admin', 'user']},
    {id:'students', label:'Students', icon:'students', roles:['admin']},
    {id:'ledger', label:'Fee Ledger', icon:'ledger', roles:['admin', 'user']},
    {id:'receipts', label:'Receipts', icon:'receipts', roles:['admin', 'user']},
    {id:'promotion', label:'Session Promotion', icon:'promotion', roles:['admin']},
    {id:'exams', label:'Exam & Admit Card', icon:'examcard', roles:['admin', 'user']},
    {id:'backup', label:'Backup & Restore', icon:'backup', roles:['admin']},
  ];
  const TITLES = {
    dashboard: ['Dashboard','Realtime fee collection overview'],
    collect: ['Fee Collection','Record a new fee payment entry'],
    students: ['Students','Manage student fee master data'],
    ledger: ['Fee Ledger','Class-wise dues & payment status'],
    receipts: ['Receipts','Look up and print a payment receipt'],
    promotion: ['Session Promotion','Naye saal ke liye bacchon ko agli class me promote karein'],
    exams: ['Exam Manager & Admit Card','School settings, exams aur admit card printing'],
    backup: ['Backup & Sync','Google Sheet Sync + snapshots and manual backups'],
  };

  function renderNav(){
    const allowedNav = NAV.filter(n => n.roles.includes(currentUserRole));
    
    let navHtml = allowedNav.map(n => `
      <div class="navitem ${route===n.id?'active':''}" data-route="${n.id}">
        ${ICONS[n.icon]}<span>${n.label}</span>
      </div>`).join('');
      
    navHtml += `
      <div class="navitem" id="nav-pass-manage" style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
        ${ICONS.password}<span>Manage Password</span>
      </div>`;

    navEl.innerHTML = navHtml;
    navEl.querySelectorAll('.navitem').forEach(el => {
      if(el.id === 'nav-pass-manage'){
        el.addEventListener('click', () => passwordManagementModal());
      } else {
        el.addEventListener('click', () => { route = el.dataset.route; render(); });
      }
    });
  }

  function go(r){ 
    const targetNav = NAV.find(n => n.id === r);
    if(targetNav && !targetNav.roles.includes(currentUserRole)){
      toast('Access Denied: Aap is section ko open nahi kar sakte.');
      return;
    }
    route = r; 
    render(); 
  }

  // ---------- DASHBOARD ----------
  function renderDashboard(){
    const demand = students.reduce((a,s)=>a+totalDue(s),0);
    const collected = students.reduce((a,s)=>a+totalPaid(s.id),0);
    const pending = demand - collected;
    const paidCount = students.filter(s=>statusOf(s)==='Paid').length;

    const byClass = {};
    students.forEach(s=>{
      byClass[s.cls] = byClass[s.cls] || {due:0, paid:0};
      byClass[s.cls].due += totalDue(s);
      byClass[s.cls].paid += totalPaid(s.id);
    });
    const maxDue = Math.max(1, ...Object.values(byClass).map(v=>v.due));
    const classRows = CLASS_ORDER.filter(c=>byClass[c]).map(c=>{
      const v = byClass[c];
      const pct = Math.round((v.due? (v.due-v.paid)/v.due : 0)*100);
      return `<div class="classbar-row">
        <div class="classbar-label">${c}</div>
        <div class="classbar-track"><div class="classbar-fill" style="width:${Math.max(4, (v.due/maxDue)*100)}%"></div></div>
        <div class="classbar-val">${fmt(v.due-v.paid)} due</div>
      </div>`;
    }).join('') || `<div class="empty-state">Koi class data nahi</div>`;

              return `<div class="recent-row">
                <div><div class="recent-name">${esc(s?s.name:'—')} <span class="id-chip">${e.receiptNo}</span></div>

      if (m) {
        const s = students.find(x=>x.id===parseInt(m[1]));
        if (s) {
          pickedId = s.id;
          const due = totalDue(s), paid = totalPaid(s.id), rest = due-paid;
          preview.className = 'pick-preview show';
          preview.innerHTML = `<b>${esc(s.name)}</b> &middot; Class ${esc(s.cls)} &middot; Rest Due: <b>${fmt(rest)}</b>`;
          return;
        }

      toast('Entry saved — Ledger updated');
      renderCollect();

    contentEl.querySelectorAll('[data-del-entry]').forEach(el=>{

        toast('Entry deleted');
        renderCollect();
      });
    });
  }

      const bills = s.bills.slice().sort((a,b)=> b.id-a.id);

                <div class="field"><label>Date</label><input type="date" id="bl-date" value="${todayISO()}"/></div>
                <div class="field" style="grid-column: span 2;"><label>Note (optional)</label><input type="text" id="bl-note" placeholder="e.g. Class 3 sports day"/></div>
              </div>
              <span class="btn btn-accent" id="ekps-bill-add">+ Add This Bill</span>

              <div style="margin-top:18px; border-top:1px solid var(--border); padding-top:12px;">
                <div style="font-size:11.5px; font-weight:700; color:var(--slate); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px;">Bill History (${bills.length})</div>
                ${bills.length ? bills.map(b=>`
                  <div class="recent-row">
                    <div><div class="recent-name">${fmtDate(b.date)}${b.note? ' &middot; ' + esc(b.note) : ''}</div></div>
                    <div style="display:flex;align-items:center;gap:10px;">
                      <div class="recent-amt" style="color:var(--ink);">${fmt(b.amount)}</div>
                      <div class="icon-btn" data-bill-del="${b.id}" title="Delete">${ICONS.trash}</div>
                    </div>
                  </div>`).join('') : `<div class="empty-state" style="padding:14px;">Abhi tak koi extra bill nahi jode gaye</div>`}
              </div>
            </div>
            <div class="modal-foot">
              <span class="btn btn-ghost" id="ekps-bill-done">Done</span>
            </div>
          </div>
        </div>`;

      const close = ()=>{ modalRoot.innerHTML=''; };
      document.getElementById('ekps-bill-bg').addEventListener('click', e=>{ if(e.target.id==='ekps-bill-bg') close(); });
      document.getElementById('ekps-bill-close').addEventListener('click', close);
      document.getElementById('ekps-bill-done').addEventListener('click', ()=>{ close(); renderStudents(); });

      const typeSel = document.getElementById('bl-type');
      const customWrap = document.getElementById('bl-custom-wrap');
      const syncCustom = ()=>{ customWrap.style.display = typeSel.value==='Other' ? '' : 'none'; };
      typeSel.addEventListener('change', syncCustom);
      syncCustom();

      document.getElementById('ekps-bill-add').addEventListener('click', ()=>{
        const type = typeSel.value==='Other' ? (document.getElementById('bl-custom').value.trim() || 'Other') : typeSel.value;
        const amount = parseFloat(document.getElementById('bl-amount').value);
        const date = document.getElementById('bl-date').value;
        const note = document.getElementById('bl-note').value.trim();
        if (!amount || amount<=0) { toast('Sahi Bill Amount daalein'); return; }
        if (!date) { toast('Date daalein'); return; }
        s.bills.push({ id: Date.now(), type, amount, date, note });
        saveStudents();
        toast('Bill added — ' + s.name);
        draw();
      });

      modalRoot.querySelectorAll('[data-bill-del]').forEach(el=>{
        el.addEventListener('click', ()=>{
          if(!confirm('Ye bill hatana hai?')) return;
          const id = parseInt(el.dataset.billDel);
          s.bills = s.bills.filter(b=>b.id!==id);
          saveStudents();
          toast('Bill removed');
          draw();
        });
      });
    }
    draw();
  }

  function chunkArr(arr, n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

  function downloadDemandBillsPDF(){
    const list = students.filter(s => (totalDue(s) - totalPaid(s.id)) > 0)
      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    if (!list.length) { toast('Koi bhi student due nahi hai'); return; }

    const classes = CLASS_ORDER.filter(c => list.some(s=>s.cls===c));
    let sheetsHtml = '';
    classes.forEach(cls=>{
      const clsStudents = list.filter(s=>s.cls===cls);
      const pages = chunkArr(clsStudents, 8);
      pages.forEach((page, pi)=>{
        const slips = page.map(s=>{
          const due = totalDue(s), paid = totalPaid(s.id), rest = due-paid;
          return `<div class="slip">
            <div class="slip-head">Education Key Public School</div>
            <div class="slip-sub">Fee Demand Notice &middot; ${fmtDate(todayISO())}</div>
            <div class="slip-row"><span>Student ID</span><span>${s.id}</span></div>
            <div class="slip-row"><span>Name</span><span>${esc(s.name)}</span></div>
            <div class="slip-row"><span>Class</span><span>${esc(s.cls)}</span></div>
            <div class="slip-row"><span>Total Due</span><span>${fmt(due)}</span></div>
            <div class="slip-row"><span>Total Paid</span><span>${fmt(paid)}</span></div>
            <div class="slip-row rest"><span>Amount Payable</span><span>${fmt(rest)}</span></div>
            <div class="slip-foot">Kripya jald se jald fee jama karein &middot; Accounts Office</div>
          </div>`;
        }).join('');
        sheetsHtml += `<div class="sheet">
          <div class="sheet-title">Class: ${esc(cls)} &mdash; Page ${pi+1} of ${pages.length}</div>
          <div class="grid">${slips}</div>
        </div>`;
      });
    });

    const win = window.open('', '_blank');
    if (!win) { toast('Popup block ho gaya — popup allow karein'); return; }
    win.document.write(`<!DOCTYPE html><html><head><title>Fee Demand Bills</title><style>
      @page { size: A4; margin: 10mm; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Arial, Helvetica, sans-serif; color:#1B2A4A; }
      .sheet { page-break-after: always; }
      .sheet:last-child { page-break-after: auto; }
      .sheet-title { font-size:13px; font-weight:700; margin-bottom:8px; text-align:center; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap:5mm; height: 267mm; }
      .slip { border:1.5px dashed #99a; border-radius:4px; padding:9px 11px; font-size:11px; display:flex; flex-direction:column; }
      .slip-head { font-weight:800; font-size:12.5px; }
      .slip-sub { font-size:9px; color:#555; margin-bottom:5px; border-bottom:1px solid #ccc; padding-bottom:5px; }
      .slip-row { display:flex; justify-content:space-between; padding:2px 0; font-size:11px; }
      .slip-row.rest { font-weight:800; border-top:1px dashed #99a; margin-top:5px; padding-top:5px; font-size:12.5px; color:#C1502E; }
      .slip-foot { margin-top:auto; font-size:8.5px; color:#666; padding-top:6px; border-top:1px dashed #ccc; }
    </style></head><body>${sheetsHtml}</body></html>`);
    win.document.close();
    win.focus();
    setTimeout(()=> win.print(), 300);
  }

  function exportExcel(){
    if (typeof XLSX === 'undefined') { toast('Excel library load nahi hui — internet check karein'); return; }
    const list = students.slice().sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    const rows = list.map(s=>{
      const due = totalDue(s), paid = totalPaid(s.id), rest = due-paid, st = statusOf(s);
      const row = {
        'ID': s.id,
        'Class': s.cls,
        'Name': s.name,
        'Mobile No': s.mobNo || '',
        'Monthly Fee': s.monthlyFee,
        'Total Due': due,
        'Total Paid': paid,
        'Rest Due': rest,
        'Status': st,
      };
      MONTHS.forEach(m => { row[m] = monthPaid(s.id, m); });
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:6},{wch:8},{wch:26},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10}].concat(MONTHS.map(()=>({wch:9})));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Fee Ledger');
    XLSX.writeFile(wb, `Fee_Ledger_${todayISO()}.xlsx`);
    toast('Excel file download ho rahi hai');
  }

    document.getElementById('ekps-ledger-search').addEventListener('input', e=>{ ledgerFilters.q = e.target.value; renderLedger(); });

  // ---------- BACKUP & SYNC ----------
  function renderBackup(){
    const sorted = autoBackups.slice().sort((a,b)=> b.ts - a.ts);
    const lastTs = sorted.length ? sorted[0].ts : null;
    const fmtWhen = (ts)=> new Date(ts).toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});

    contentEl.innerHTML = `
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-head"><h3>Google Sheet Connection Status</h3>${syncIndicatorHtml()}</div>
        <div class="panel-body">
          <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
            Aapka application high security ke liye is specific Google Sheet link par lock kar diya gaya hai. Students data aur entries is link par automatic sync hote rahenge.
          </p>
          <div class="field">
            <label>Web App URL (Locked)</label>
            <input type="text" id="ekps-gas-url" value="${esc(GAS_URL)}" disabled style="background: var(--paper); color: var(--slate);"/>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <span class="btn btn-accent" id="ekps-gas-sync-now">⟳ Force Data Sync Now</span>
          </div>
        </div>
      </div>
      <div class="kpi-card" style="margin-bottom:18px; --accent:var(--green);">
        <div class="kpi-label">Auto-Backup Status</div>
        <div class="kpi-value" style="font-size:17px;">${lastTs ? fmtWhen(lastTs) : 'Abhi tak koi auto-backup nahi hua'}</div>
        <div class="kpi-note">Har save ke baad (max 3 min me ek baar) apne aap ek snapshot ban jata hai &middot; last ${AUTO_BACKUP_KEEP} snapshots surakshit rehte hain</div>
      </div>
      <div class="two-col">
        <div class="panel">
          <div class="panel-head"><h3>Auto Backups (Restore Point)</h3>
            <span class="btn btn-ghost btn-sm" id="ekps-backup-now">Backup Now</span></div>
          <div class="panel-body" id="ekps-autobackup-list">
            ${sorted.length ? sorted.map(b=>`
              <div class="recent-row">
                <div><div class="recent-name">${fmtWhen(b.ts)}</div>
                <div class="recent-meta">${b.students.length} students &middot; ${b.entries.length} entries</div></div>
                <span class="btn btn-ghost btn-sm" data-restore-auto="${b.ts}">Restore</span>
              </div>`).join('') : `<div class="empty-state">Koi auto-backup abhi nahi bana. Kuch save karein ya "Backup Now" dabayein.</div>`}
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>Download Backup File</h3></div>
          <div class="panel-body">
            <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
              Sabhi students, unke fees/bills, aur payment entries ek single <span class="mono">.json</span> file me save ho jayenge.
              Ye file surakshit rakhein — kabhi bhi data manually restore karne ke kaam aayegi.
            </p>
            <div class="kpi-card" style="margin-bottom:16px;">
              <div class="kpi-label">Current Data</div>
              <div class="kpi-value" style="font-size:19px;">${students.length} Students &middot; ${entries.length} Entries</div>
              <div class="kpi-note">Backup me ye poora data shamil hoga</div>
            </div>
            <span class="btn btn-accent" id="ekps-backup-download">⬇ Download Backup (.json)</span>
          </div>
        </div>
      </div>
      <div class="panel" style="margin-top:16px;">
        <div class="panel-head"><h3>Restore From Backup File</h3></div>
        <div class="panel-body">
          <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
            Pehle se downloaded backup <span class="mono">.json</span> file yahan select karein. <b style="color:var(--rust);">Dhyan rahe:</b> restore karne se maujooda saara data replace ho jayega.
          </p>
          <div class="field">
            <label>Select Backup File</label>
            <input type="file" id="ekps-restore-file" accept="application/json,.json"/>
          </div>
          <span class="btn btn-danger" id="ekps-restore-btn" style="border-color:var(--rust); background:var(--rust-bg);">⬆ Restore Data</span>
        </div>
      </div>`;

    document.getElementById('ekps-gas-sync-now').addEventListener('click', () => {
      loadData();
      toast('Google sheet ke sath sync refresh kiya ja raha hai...');
    });

    document.getElementById('ekps-backup-now').addEventListener('click', () => {
      snapshotNow();
      toast('Backup snapshot ban gaya');
      renderBackup();
    });

    contentEl.querySelectorAll('[data-restore-auto]').forEach(el=>{
      el.addEventListener('click', () => {
        const ts = parseFloat(el.dataset.restoreAuto);
        const snap = autoBackups.find(b=>b.ts===ts);
        if (!snap) return;
        if (!confirm(`Is ${fmtWhen(ts)} wale snapshot par restore karein? Isse maujooda data hat jayega.`)) return;
        students = JSON.parse(JSON.stringify(snap.students));
        entries = JSON.parse(JSON.stringify(snap.entries));
        students.forEach(s=>{ if (!Array.isArray(s.bills)) s.bills = []; });
        saveStudents();
        saveEntries();
        toast('Auto-backup se restore ho gaya');
        renderBackup();
      });
    });

    document.getElementById('ekps-backup-download').addEventListener('click', ()=>{
      const payload = {
        app: 'Education Key Public School — Fee Manager',
        exportedAt: new Date().toISOString(),
        students,
        entries
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `EKPS_Backup_${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Backup download ho rahi hai');
    });

    document.getElementById('ekps-restore-btn').addEventListener('click', ()=>{
      const fileInput = document.getElementById('ekps-restore-file');
      const file = fileInput.files && fileInput.files[0];
      if (!file) { toast('Pehle ek backup file select karein'); return; }
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data.students) || !Array.isArray(data.entries)) {
            toast('Ye file valid backup nahi hai');
            return;
          }
          if (!confirm(`Restore karein? Isse maujooda data hat jayega.`)) return;
          data.students.forEach(s=>{ if (!Array.isArray(s.bills)) s.bills = []; if (typeof s.mobNo !== 'string') s.mobNo = s.mobNo ? String(s.mobNo) : ''; });
          students = data.students;
          entries = data.entries;
          saveStudents();
          saveEntries();
          toast('Data restore ho gaya');
          renderBackup();
        } catch(err){
          toast('File padhne me error — sahi .json file chunein');
        }
      };
      reader.readAsText(file);
    });
  }

  // ---------- SESSION PROMOTION ----------
  function renderPromotion(){
    const availableClasses = CLASS_ORDER.filter(c => students.some(s=>s.cls===c));
    if (promotionFromClass==null || !availableClasses.includes(promotionFromClass)) {
      promotionFromClass = availableClasses[0] || null;
    }
    const toClass = promotionFromClass ? nextClassOf(promotionFromClass) : null;
    const list = promotionFromClass ? students.filter(s=>s.cls===promotionFromClass).sort((a,b)=>a.id-b.id) : [];
    const selectedCount = list.filter(s=>promotionSelected[s.id]).length;
    const allChecked = list.length>0 && selectedCount===list.length;

    contentEl.innerHTML = `
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-body">
          <div class="form-grid" style="align-items:end;">
            <div class="field" style="grid-column: span 1;">
              <label>Class Select Karein</label>
              <select id="promo-from-cls">
                ${availableClasses.map(c=>`<option value="${c}" ${c===promotionFromClass?'selected':''}>${c} (${students.filter(s=>s.cls===c).length} students)</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="promo-flow" style="margin-top:6px;">
            <span class="cls-pill">${esc(promotionFromClass||'—')}</span>
            <span class="arrow">➜</span>
            <span class="cls-pill" style="background:var(--green);">${esc(toClass||'—')}</span>
          </div>
          <div class="hint" style="margin-top:8px;">
            Promote karte hi selected bacchon ki class <b>${esc(toClass||'—')}</b> ho jayegi, unka <b>rest due amount naye "Old Due" me carry-forward</b> ho jayega, aur is session ki saari mahine-war collection entries clear ho jayengi.
            ${toClass==='Passed Out' ? '<br><b style="color:var(--rust);">Dhyan rahe:</b> ye school ki final class hai — promote karne par bacche "Passed Out" ho jayenge.' : ''}
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h3>${esc(promotionFromClass||'—')} &mdash; Students (${list.length})</h3>
          <span class="btn btn-accent btn-sm" id="promo-run" ${selectedCount? '' : 'disabled'}>⬆ Promote Selected (${selectedCount})</span>
        </div>
        <div class="promo-selectall">
          <input type="checkbox" id="promo-select-all" ${allChecked?'checked':''}/>
          <span>Sabhi Select Karein</span>
        </div>
        <div class="panel-body" style="padding:0 18px;">
          ${list.length ? list.map(s=>{
            const rest = totalDue(s) - totalPaid(s.id);
            return `<div class="check-row">
              <input type="checkbox" data-promo-check="${s.id}" ${promotionSelected[s.id]?'checked':''}/>
              <span class="id-chip">${s.id}</span>
              <span class="cr-name">${esc(s.name)}</span>
              <span class="cr-due">${rest>0? 'Due: '+fmt(rest) : 'Clear'}</span>
            </div>`;
          }).join('') : `<div class="empty-state">Is class me koi student nahi hai</div>`}
        </div>
      </div>`;

    document.getElementById('promo-from-cls').addEventListener('change', (e)=>{
      promotionFromClass = e.target.value;
      promotionSelected = {};
      renderPromotion();
    });
    document.getElementById('promo-select-all').addEventListener('change', (e)=>{
      list.forEach(s=>{ promotionSelected[s.id] = e.target.checked; });
      renderPromotion();
    });
    contentEl.querySelectorAll('[data-promo-check]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const id = parseInt(el.dataset.promoCheck);
        promotionSelected[id] = el.checked;
        renderPromotion();
      });
    });
    const runBtn = document.getElementById('promo-run');
    if (runBtn) runBtn.addEventListener('click', ()=>{
      const ids = list.filter(s=>promotionSelected[s.id]).map(s=>s.id);
      if (!ids.length) return;
      if (!confirm(`${ids.length} student(s) ko "${promotionFromClass}" se "${toClass}" me promote karein?\n\nUnka bacha hua due amount "Old Due" me carry-forward ho jayega aur is session ki collection entries clear ho jayengi. Ye action undo nahi ho sakta (Backup zaroor le lein).`)) return;

      ids.forEach(id=>{
        const s = students.find(x=>x.id===id);
        if (!s) return;
        const rest = totalDue(s) - totalPaid(s.id);
        s.oldDue = Math.max(0, Math.round(rest));
        s.examFee = 0;
        s.uniformBill = 0;
        s.bookBill = 0;
        s.otherBill = 0;
        s.bills = [];
        s.cls = toClass;
        entries = entries.filter(e=>e.studentId!==id);
        promotionSelected[id] = false;
      });
      saveStudents();
      saveEntries();
      toast(`${ids.length} student(s) promote ho gaye — ${toClass}`);
      renderPromotion();
    });
  }

        document.getElementById('sc-sign-preview').innerHTML = `<img src="${pendingSign}"/>`;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('sc-save').addEventListener('click', ()=>{
      schoolSettings = {
        name: document.getElementById('sc-name').value.trim() || 'Education Key Public School',
        address: document.getElementById('sc-address').value.trim(),
        phone: document.getElementById('sc-phone').value.trim(),
        principalName: document.getElementById('sc-principal').value.trim(),
        principalSign: pendingSign || '',
        instructions: document.getElementById('sc-instructions').value.split('\n').map(x=>x.trim()).filter(Boolean),
      };
      saveSchoolSettings();
      toast('School settings save ho gayi');
      renderExamSettings();
    });
  }

  function renderExamCreator(){
    const body = document.getElementById('ekps-exam-body');
    const sorted = exams.slice().sort((a,b)=> (b.startDate||'').localeCompare(a.startDate||''));
    body.innerHTML = `
      <div class="two-col">
        <div class="panel">
          <div class="panel-head"><h3>New Exam</h3></div>
          <div class="panel-body">
            <div class="field"><label>Exam Name</label><input type="text" id="ex-name" placeholder="e.g. Half Yearly Exam"/></div>
            <div class="form-grid">
              <div class="field"><label>Start Date</label><input type="date" id="ex-start"/></div>
              <div class="field"><label>End Date</label><input type="date" id="ex-end"/></div>
            </div>
            <span class="btn btn-accent" id="ex-add">+ Add Exam</span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>All Exams (${exams.length})</h3></div>
          <div class="panel-body" id="ex-list">
            ${sorted.length ? sorted.map(x=>`
              <div class="recent-row">
                <div><div class="recent-name">${esc(x.name)}</div>
                <div class="recent-meta">${fmtDate(x.startDate)} &ndash; ${fmtDate(x.endDate)}</div></div>
                <div class="icon-btn" data-ex-del="${x.id}" title="Delete">${ICONS.trash}</div>
              </div>`).join('') : `<div class="empty-state">Koi exam nahi bana</div>`}
          </div>
        </div>
      </div>`;

    document.getElementById('ex-add').addEventListener('click', ()=>{
      const name = document.getElementById('ex-name').value.trim();
      const startDate = document.getElementById('ex-start').value;
      const endDate = document.getElementById('ex-end').value;
      if (!name) { toast('Exam ka naam daalein'); return; }
      if (!startDate || !endDate) { toast('Start aur End date daalein'); return; }
      exams.push({ id: Date.now(), name, startDate, endDate });
      saveExams();
      toast('Exam add ho gaya');
      renderExamCreator();
    });

    body.querySelectorAll('[data-ex-del]').forEach(el=>{
      el.addEventListener('click', ()=>{
        if (!confirm('Ye exam delete karein?')) return;
        exams = exams.filter(x=>x.id!==parseInt(el.dataset.exDel));
        saveExams();
        toast('Exam deleted');
        renderExamCreator();
      });
    });
  }

  function renderAdmitPrintSelector(){
    const body = document.getElementById('ekps-exam-body');
    if (examSelectedId==null && exams.length) examSelectedId = exams[exams.length-1].id;
    const availableClasses = ['all', ...CLASS_ORDER.filter(c => students.some(s=>s.cls===c))];
    const list = students.filter(s => admitClassFilter==='all' || s.cls===admitClassFilter)
      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    const selectedCount = list.filter(s=>admitSelected[s.id]).length;
    const allChecked = list.length>0 && selectedCount===list.length;

    if (!exams.length) {
      body.innerHTML = `<div class="empty-state">Pehle "Exam Creator" tab se ek exam banayein.</div>`;
      return;
    }

    body.innerHTML = `
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-body">
          <div class="form-grid">
            <div class="field"><label>Exam</label>
              <select id="admit-exam-sel">
                ${exams.map(x=>`<option value="${x.id}" ${x.id===examSelectedId?'selected':''}>${esc(x.name)}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label>Class</label>
              <select id="admit-cls-sel">
                ${availableClasses.map(c=>`<option value="${c}" ${c===admitClassFilter?'selected':''}>${c==='all'?'All Classes':c}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h3>Students (${list.length})</h3>
          <span class="btn btn-primary btn-sm" id="admit-print-btn" ${selectedCount? '' : 'disabled'}>${ICONS.print} Print Admit Cards (${selectedCount})</span>
        </div>
        <div class="promo-selectall">
          <input type="checkbox" id="admit-select-all" ${allChecked?'checked':''}/>
          <span>Sabhi Select Karein</span>
        </div>
        <div class="panel-body" style="padding:0 18px;">
          ${list.length ? list.map(s=>`
            <div class="check-row">
              <input type="checkbox" data-admit-check="${s.id}" ${admitSelected[s.id]?'checked':''}/>
              <span class="id-chip">${s.id}</span>
              <span class="cls-chip">${esc(s.cls)}</span>
              <span class="cr-name">${esc(s.name)}</span>
            </div>`).join('') : `<div class="empty-state">Is class me koi student nahi hai</div>`}
        </div>
      </div>`;

    document.getElementById('admit-exam-sel').addEventListener('change', (e)=>{ examSelectedId = parseInt(e.target.value); renderAdmitPrintSelector(); });
    document.getElementById('admit-cls-sel').addEventListener('change', (e)=>{ admitClassFilter = e.target.value; admitSelected = {}; renderAdmitPrintSelector(); });
    document.getElementById('admit-select-all').addEventListener('change', (e)=>{
      list.forEach(s=>{ admitSelected[s.id] = e.target.checked; });
      renderAdmitPrintSelector();
    });
    body.querySelectorAll('[data-admit-check]').forEach(el=>{
      el.addEventListener('change', ()=>{
        admitSelected[parseInt(el.dataset.admitCheck)] = el.checked;
        renderAdmitPrintSelector();
      });
    });
    const printBtn = document.getElementById('admit-print-btn');
    if (printBtn) printBtn.addEventListener('click', ()=>{
      const ids = list.filter(s=>admitSelected[s.id]).map(s=>s.id);
      if (!ids.length) return;
      const exam = exams.find(x=>x.id===examSelectedId);
      if (!exam) { toast('Pehle exam select karein'); return; }
      printAdmitCards(exam, ids);
    });
  }

  function printAdmitCards(exam, studentIds){
    const list = studentIds.map(id=>students.find(s=>s.id===id)).filter(Boolean)
      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    if (!list.length) { toast('Koi student select nahi hai'); return; }

    const instructionsHtml = (schoolSettings.instructions||[]).map(i=>`<li>${esc(i)}</li>`).join('');
    const pages = chunkArr(list, 4);
    let sheetsHtml = '';
    pages.forEach(page=>{
      const cardsHtml = page.map(s=>`
        <div class="admit-card">
          <div class="ac-head">
            <div class="ac-photo">${s.photo ? `<img src="${s.photo}"/>` : '<span>Photo</span>'}</div>
            <div class="ac-headtext">
              <div class="ac-school">${esc(schoolSettings.name)}</div>
              ${schoolSettings.address ? `<div class="ac-sub">${esc(schoolSettings.address)}</div>` : ''}
              ${schoolSettings.phone ? `<div class="ac-sub">Ph: ${esc(schoolSettings.phone)}</div>` : ''}
              <div class="ac-title">ADMIT CARD &mdash; ${esc(exam.name)}</div>
            </div>
          </div>
          <div class="ac-row"><span>Exam Duration</span><span>${fmtDate(exam.startDate)} to ${fmtDate(exam.endDate)}</span></div>
          <div class="ac-row"><span>Student Name</span><span>${esc(s.name)}</span></div>
          <div class="ac-row"><span>Class</span><span>${esc(s.cls)}</span></div>
          <div class="ac-row"><span>Roll / ID No.</span><span>${s.id}</span></div>
          ${instructionsHtml ? `<div class="ac-instr"><b>Instructions:</b><ul>${instructionsHtml}</ul></div>` : ''}
          <div class="ac-foot">
            <div class="ac-sign">${schoolSettings.principalSign ? `<img src="${schoolSettings.principalSign}"/>` : ''}<div class="ac-sign-label">Principal Signature</div></div>
          </div>
        </div>`).join('');
      sheetsHtml += `<div class="sheet"><div class="grid4">${cardsHtml}</div></div>`;
    });

    const win = window.open('', '_blank');
    if (!win) { toast('Popup block ho gaya — popup allow karein'); return; }
    win.document.write(`<!DOCTYPE html><html><head><title>Admit Cards</title><style>
      @page { size: A4; margin: 8mm; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Arial, Helvetica, sans-serif; color:#1B2A4A; }
      .sheet { page-break-after: always; }
      .sheet:last-child { page-break-after: auto; }
      .grid4 { display:grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap:5mm; height: 281mm; }
      .admit-card { border:1.5px solid #1B2A4A; border-radius:6px; padding:8px 10px; display:flex; flex-direction:column; font-size:10.5px; overflow:hidden; }
      .ac-head { display:flex; gap:8px; align-items:flex-start; border-bottom:1px solid #ccc; padding-bottom:6px; margin-bottom:6px; }
      .ac-photo { width:46px; height:56px; border:1px solid #999; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; color:#888; overflow:hidden; }
      .ac-photo img { width:100%; height:100%; object-fit:cover; }
      .ac-headtext { flex:1; }
      .ac-school { font-weight:800; font-size:12.5px; }
      .ac-sub { font-size:8.5px; color:#555; }
      .ac-title { font-weight:700; font-size:10px; margin-top:3px; color:#C1502E; }
      .ac-row { display:flex; justify-content:space-between; padding:2px 0; font-size:10px; }
      .ac-row span:first-child { color:#555; }
      .ac-row span:last-child { font-weight:700; }
      .ac-instr { margin-top:4px; font-size:8.5px; color:#333; }
      .ac-instr ul { margin:2px 0 0 14px; padding:0; }
      .ac-foot { margin-top:auto; display:flex; justify-content:flex-end; padding-top:6px; }
      .ac-sign { text-align:center; }
      .ac-sign img { height:26px; display:block; margin:0 auto; }
      .ac-sign-label { font-size:8px; border-top:1px solid #999; padding-top:2px; margin-top:2px; }
    </style></head><body>${sheetsHtml}</body></html>`);
    win.document.close();
    win.focus();
    setTimeout(()=> win.print(), 300);
  }

  // Setup Logout handler
  document.getElementById('ekps-logout-btn').addEventListener('click', () => {
    currentUserRole = null;
    localStorage.removeItem('ekps_session');
    toast('Logged out successfully');
    render();
  });

  function render(){
    if (!ready) { contentEl.innerHTML = `<div class="empty-state">Loading&hellip;</div>`; return; }
    
    // Auth route guard
    if(!currentUserRole) {
      renderLoginView();
      return;
    }

    // Secondary route guard based on role privileges
    const activeRouteConfig = NAV.find(n => n.id === route);
    if(activeRouteConfig && !activeRouteConfig.roles.includes(currentUserRole)){
      route = 'dashboard'; 
    }

    // Top Bar setups for verified users
    document.getElementById('ekps-logout-btn').style.display = 'inline-block';
    const rb = document.getElementById('ekps-role-badge');
    rb.style.display = 'inline-block';
    rb.textContent = currentUserRole;
    
    renderNav();
    titleEl.textContent = TITLES[route][0];
    subEl.textContent = TITLES[route][1];
    
    if (route==='dashboard') renderDashboard();
    else if (route==='collect') renderCollect();
    else if (route==='students') renderStudents();
    else if (route==='ledger') renderLedger();
    else if (route==='receipts') renderReceipts();
    else if (route==='promotion') renderPromotion();
    else if (route==='exams') renderExams();
    else if (route==='backup') renderBackup();
  }

  function tickClock(){
    const el = document.getElementById('ekps-clock');
    if (el) el.textContent = new Date().toLocaleString('en-IN', {weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
  }
  setInterval(tickClock, 1000*30);
  tickClock();

  loadData();
  render();
})();
</script>
