<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  #ekps-root, #ekps-root * { box-sizing: border-box; }
  #ekps-root {
    --ink:#1B2A4A;
    --ink-2:#28395C;
    --paper:#F4F1E9;
    --card:#FFFFFF;
    --saffron:#E8A33D;
    --saffron-dark:#C9821F;
    --slate:#5B6B82;
    --green:#2F8F5B;
    --green-bg:#E7F4EC;
    --rust:#C1502E;
    --rust-bg:#FBEAE4;
    --amber:#B9862A;
    --amber-bg:#FBF1DC;
    --border:#E4E0D3;
    --border-strong:#D6D0BF;
    --shadow: 0 1px 2px rgba(27,42,74,0.06), 0 8px 24px -12px rgba(27,42,74,0.18);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    position: relative;
    isolation: isolate;
  }
  #ekps-root .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  #ekps-root .disp { font-family: 'Sora', ui-sans-serif, sans-serif; }

  /* ---------- Sidebar ---------- */
  #ekps-root .sidebar {
    width: 236px;
    flex-shrink: 0;
    background: linear-gradient(185deg, var(--ink) 0%, #16233F 100%);
    color: #EAEDF4;
    display: flex;
    flex-direction: column;
    padding: 22px 16px;
    min-height: 100vh;
    position: sticky;
    top: 0;
  }
  #ekps-root .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 20px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 18px;
  }
  #ekps-root .brand-badge {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--saffron);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora'; font-weight: 800; color: var(--ink); font-size: 15px;
    flex-shrink: 0;
  }
  #ekps-root .brand-name { font-family:'Sora'; font-weight: 700; font-size: 13.5px; line-height: 1.25; }
  #ekps-root .brand-sub { font-size: 10.5px; color: #A9B4CB; letter-spacing: .04em; text-transform: uppercase; margin-top: 1px; }

  nav.navlist { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
  #ekps-root .navitem {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    color: #C7CFE0; font-size: 13.5px; font-weight: 500;
    transition: background .15s, color .15s;
    user-select: none;
  }
  #ekps-root .navitem:hover { background: rgba(255,255,255,0.06); color: #fff; }
  #ekps-root .navitem.active { background: rgba(232,163,61,0.16); color: #fff; }
  #ekps-root .navitem.active .navicon { color: var(--saffron); }
  #ekps-root .navicon { width: 17px; height: 17px; flex-shrink: 0; color: #8D98B3; }
  #ekps-root .navitem.active .navicon, #ekps-root .navitem:hover .navicon { color: var(--saffron); }

  #ekps-root .sidebar-foot {
    margin-top: auto; padding: 12px 10px 2px 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 10.5px; color: #8D98B3; line-height: 1.5;
  }

  /* ---------- Main ---------- */
  #ekps-root .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #ekps-root .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    background: rgba(244,241,233,0.85); backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  #ekps-root .topbar h1 { font-family:'Sora'; font-size: 19px; font-weight: 700; margin: 0; }
  #ekps-root .topbar .sub { font-size: 12px; color: var(--slate); margin-top: 2px; }
  #ekps-root .topbar-right { display:flex; align-items:center; gap: 14px; font-size: 12px; color: var(--slate); }
  #ekps-root .content { padding: 24px 28px 60px 28px; }

  #ekps-root .btn {
    font-family: 'Inter'; font-weight: 600; font-size: 13px;
    padding: 9px 16px; border-radius: 8px; border: 1px solid transparent;
    cursor: pointer; display:inline-flex; align-items:center; gap: 7px;
    transition: transform .06s ease, box-shadow .15s;
  }
  #ekps-root .btn:active { transform: translateY(1px); }
  #ekps-root .btn-primary { background: var(--ink); color:#fff; }
  #ekps-root .btn-primary:hover { background: var(--ink-2); }
  #ekps-root .btn-accent { background: var(--saffron); color: var(--ink); }
  #ekps-accent:hover { background: var(--saffron-dark); color: #fff; }
  #ekps-root .btn-ghost { background: transparent; border-color: var(--border-strong); color: var(--ink); }
  #ekps-root .btn-ghost:hover { background: #fff; }
  #ekps-root .btn-sm { padding: 6px 11px; font-size: 12px; }
  #ekps-root .btn-danger { background: transparent; color: var(--rust); border-color: #EAD0C6; }
  #ekps-root .btn-danger:hover { background: var(--rust-bg); }
  #ekps-root .btn:disabled { opacity:.45; cursor:not-allowed; }

  /* ---------- Cards / KPIs ---------- */
  #ekps-root .kpi-grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
  #ekps-root .kpi-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow:hidden;
  }
  #ekps-root .kpi-card::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--accent, var(--saffron));
  }
  #ekps-root .kpi-label { font-size: 11.5px; color: var(--slate); text-transform: uppercase; letter-spacing: .05em; font-weight:600; }
  #ekps-root .kpi-value { font-family:'Sora'; font-weight: 700; font-size: 25px; margin-top: 6px; }
  #ekps-root .kpi-note { font-size: 11px; color: var(--slate); margin-top: 4px; }

  #ekps-root .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
  #ekps-root .panel-head { display:flex; align-items:center; justify-content:space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  #ekps-root .panel-head h3 { font-family:'Sora'; font-size:14.5px; margin:0; font-weight:700; }
  #ekps-root .panel-body { padding: 16px 18px; }

  #ekps-root .two-col { display:grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items:start; }

  /* class bars */
  #ekps-root .classbar-row { display:flex; align-items:center; gap: 10px; padding: 7px 0; }
  #ekps-root .classbar-label { width: 46px; font-size: 12px; font-weight:600; color: var(--ink); flex-shrink:0; }
  #ekps-root .classbar-track { flex:1; height: 9px; background:#EFEBDF; border-radius: 5px; overflow:hidden; }
  #ekps-root .classbar-fill { height:100%; background: linear-gradient(90deg, var(--saffron), var(--saffron-dark)); border-radius: 5px; }
  #ekps-root .classbar-val { width: 84px; text-align:right; font-size: 11.5px; font-family:'IBM Plex Mono'; color: var(--slate); flex-shrink:0; }

  /* recent list */
  #ekps-root .recent-row { display:flex; align-items:center; justify-content:space-between; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size:13px; }
  #ekps-root .recent-row:last-child { border-bottom:none; }
  #ekps-root .recent-name { font-weight:600; }
  #ekps-root .recent-meta { font-size:11.5px; color:var(--slate); }
  #ekps-root .recent-amt { font-family:'IBM Plex Mono'; font-weight:600; color: var(--green); }

  /* ---------- Forms ---------- */
  #ekps-root .field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  #ekps-root .field label { font-size:11.5px; font-weight:600; color: var(--slate); text-transform:uppercase; letter-spacing:.03em; }
  #ekps-root .field input, #ekps-root .field select {
    font-family:'Inter'; font-size: 13.5px; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--border-strong); background:#fff; color: var(--ink); outline:none;
  }
  #ekps-root .field input:focus, #ekps-root .field select:focus { border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(232,163,61,0.18); }
  #ekps-root .field .hint { font-size: 11px; color: var(--slate); }
  #ekps-root .form-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 0 16px; }
  #ekps-root .form-grid.cols-4 { grid-template-columns: repeat(4,1fr); }

  #ekps-root .pick-preview {
    margin-top: -4px; margin-bottom: 14px; padding: 10px 12px; border-radius: 8px;
    background: var(--paper); border: 1px dashed var(--border-strong); font-size: 12.5px; color: var(--ink);
    display:none;
  }
  #ekps-root .pick-preview.show { display:block; }
  #ekps-root .pick-preview b { font-weight:700; }

  /* ---------- Tables ---------- */
  #ekps-root table.data { width:100%; border-collapse: collapse; font-size: 13px; }
  #ekps-root table.data thead th {
    text-align:left; font-size: 11px; text-transform:uppercase; letter-spacing:.04em;
    color: var(--slate); font-weight:700; padding: 9px 10px; border-bottom: 1px solid var(--border-strong);
    background: #FBFAF6; position: sticky; top:0;
  }
  #ekps-root table.data tbody td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  #ekps-root table.data tbody tr:hover { background: #FCFAF3; }
  #ekps-root table.data tbody tr.detail-row { background: #FBFAF6; }
  #ekps-root table.data tbody tr.detail-row:hover { background: #FBFAF6; }
  #ekps-root .id-chip { font-family:'IBM Plex Mono'; font-size:11.5px; background:#EFEBDD; border-radius:5px; padding:2px 6px; color:var(--ink-2); }
  #ekps-root .cls-chip { font-size:11px; font-weight:600; color: var(--ink-2); background:#EDE9F5; border-radius:5px; padding:2px 7px; }

  #ekps-root .status-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block; letter-spacing:.02em; }
  #ekps-root .status-Paid { background: var(--green-bg); color: var(--green); }
  #ekps-root .status-Partial { background: var(--amber-bg); color: var(--amber); }
  #ekps-root .status-Due { background: var(--rust-bg); color: var(--rust); }
  #ekps-root .status-Admitted { background: var(--green-bg); color: var(--green); }
  #ekps-root .status-Registered { background: var(--amber-bg); color: var(--amber); }
  #ekps-root .status-InStock { background: var(--green-bg); color: var(--green); }
  #ekps-root .status-Low { background: var(--amber-bg); color: var(--amber); }
  #ekps-root .status-Out { background: var(--rust-bg); color: var(--rust); }
  #ekps-root .aging-bucket { font-family:'IBM Plex Mono'; font-size:11.5px; padding:2px 7px; border-radius:5px; display:inline-block; }
  #ekps-root .aging-0 { background:#EFEBDD; color:var(--ink-2); }
  #ekps-root .aging-1 { background: var(--amber-bg); color: var(--amber); }
  #ekps-root .aging-2 { background:#FCE3D3; color:#B15420; }
  #ekps-root .aging-3 { background: var(--rust-bg); color: var(--rust); }

  #ekps-root .row-actions { display:flex; gap:6px; }
  #ekps-root .icon-btn {
    width: 28px; height:28px; border-radius:7px; border:1px solid var(--border-strong); background:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color: var(--slate);
  }
  #ekps-root .icon-btn:hover { background: var(--paper); color: var(--ink); }
  #ekps-root .icon-btn svg { width:14px; height:14px; }

  #ekps-root .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  #ekps-root .toolbar input[type=text], #ekps-root .toolbar select {
    font-family:'Inter'; font-size:13px; padding: 8px 11px; border-radius:8px; border:1px solid var(--border-strong); background:#fff;
  }
  #ekps-root .search-wrap { position:relative; }
  #ekps-root .toolbar .search-wrap { flex:1; min-width:200px; max-width:320px; }
  #ekps-root .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--slate); pointer-events:none; }
  #ekps-root .search-wrap input[type=text] { padding-left: 30px; width:100%; font-family:'Inter'; font-size:13px; padding-top:8px; padding-bottom:8px; padding-right:11px; border-radius:8px; border:1px solid var(--border-strong); background:#fff; color:var(--ink); }
  #ekps-root .search-wrap input[type=text]:focus { outline:none; border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(232,163,61,0.18); }

  #ekps-root .empty-state { text-align:center; padding: 46px 20px; color: var(--slate); }
  #ekps-root .empty-state .disp { font-size:15px; color: var(--ink); margin-bottom:4px; }

  /* ---------- Admin Controls page ---------- */
  #ekps-root .admctl-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 4px; border-bottom:1px dashed var(--border); }
  #ekps-root .admctl-row:last-child { border-bottom:none; }
  #ekps-root .admctl-info { display:flex; align-items:center; gap:12px; }
  #ekps-root .admctl-info .admctl-ic { width:19px; height:19px; color:var(--saffron-dark); flex-shrink:0; }
  #ekps-root .admctl-label { font-weight:700; font-size:13.5px; }
  #ekps-root .admctl-hint { font-size:11.5px; color:var(--slate); margin-top:1px; }
  #ekps-root .admctl-note { display:flex; align-items:flex-start; gap:10px; font-size:12.5px; color:var(--ink-2); line-height:1.5; }
  #ekps-root .admctl-note-dot { width:9px; height:9px; border-radius:50%; background:var(--amber); margin-top:4px; flex-shrink:0; }

  #ekps-root .toggle-switch { position:relative; display:inline-block; width:42px; height:24px; flex-shrink:0; }
  #ekps-root .toggle-switch input { opacity:0; width:0; height:0; }
  #ekps-root .toggle-slider { position:absolute; cursor:pointer; inset:0; background:#D9D4C4; border-radius:24px; transition:.15s; }
  #ekps-root .toggle-slider::before { content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s; box-shadow:0 1px 2px rgba(0,0,0,0.25); }
  #ekps-root .toggle-switch input:checked + .toggle-slider { background: var(--green); }
  #ekps-root .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

  /* ---------- Staff/User entry indication (yellow) ---------- */
  #ekps-root [data-created-by="user"] { background: var(--amber-bg) !important; }
  #ekps-root .recent-row[data-created-by="user"],
  #ekps-root tr[data-created-by="user"],
  #ekps-root .check-row[data-created-by="user"] { border-left: 3px solid var(--amber); padding-left: 8px; }
  #ekps-root .entry-badge-user {
    display:inline-flex; align-items:center; gap:4px; font-size:9.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.03em; padding:2px 7px; border-radius:20px; background:var(--amber-bg); color:var(--amber-dark, var(--amber));
    border:1px solid #EBD9A6; vertical-align:middle;
  }

  /* User/Staff role: delete controls are always hidden as an extra safety net
     (delete buttons are already not rendered for the User role in markup) */
  #ekps-root.role-user .js-del-btn,
  #ekps-root.role-user [data-del-entry],
  #ekps-root.role-user [data-bill-del],
  #ekps-root.role-user [data-del],
  #ekps-root.role-user [data-del-adm],
  #ekps-root.role-user [data-rt-del],
  #ekps-root.role-user [data-del-tr-entry],
  #ekps-root.role-user [data-inv-del],
  #ekps-root.role-user [data-log-del],
  #ekps-root.role-user [data-vd-del],
  #ekps-root.role-user [data-ex-del] { display:none !important; }

  #ekps-root .month-grid { display:grid; grid-template-columns: repeat(6,1fr); gap:6px; padding: 12px 10px 14px 40px; }
  #ekps-root .month-cell { border-radius:7px; padding:7px 8px; font-size:11px; background:#fff; border:1px solid var(--border); }
  #ekps-root .month-cell .m { color:var(--slate); font-weight:600; text-transform:uppercase; font-size:9.5px; letter-spacing:.03em; }
  #ekps-root .month-cell .v { font-family:'IBM Plex Mono'; font-weight:700; margin-top:2px; }
  #ekps-root .month-cell.paid { background: var(--green-bg); border-color:#CFE9D9; }
  #ekps-root .month-cell.paid .v { color: var(--green); }

  #ekps-root .toast {
    position: fixed; bottom: 22px; right: 22px; background: var(--ink); color:#fff;
    padding: 12px 18px; border-radius: 9px; font-size:13px; box-shadow: var(--shadow);
    display:flex; align-items:center; gap:9px; z-index: 60; opacity:0; transform: translateY(8px);
    transition: opacity .25s, transform .25s; pointer-events:none;
  }
  #ekps-root .toast.show { opacity:1; transform:translateY(0); }
  #ekps-root .toast .dot { width:7px; height:7px; border-radius:50%; background: var(--saffron); }

  #ekps-root .modal-backdrop {
    position: fixed; inset:0; background: rgba(20,28,46,0.45); z-index: 50;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  #ekps-root .modal {
    background:#fff; border-radius: 14px; width: 560px; max-width:100%; max-height: 88vh; overflow:auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  #ekps-root .modal-head { padding: 18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  #ekps-root .modal-head h3 { font-family:'Sora'; margin:0; font-size:16px; }
  #ekps-root .modal-body { padding: 18px 20px; }
  #ekps-root .modal-foot { padding: 14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  /* ---------- Receipt (signature element) ---------- */
  #ekps-root .receipt-wrap { display:flex; justify-content:center; padding: 10px 0 20px 0; }
  #ekps-root .receipt {
    width: 380px; background:#fff; border-radius: 4px; position:relative;
    box-shadow: var(--shadow); padding: 26px 26px 20px 26px;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px);
    background-size: 100% 26px;
    background-position: 0 118px;
  }
  #ekps-root .receipt::before, #ekps-root .receipt::after {
    content:""; position:absolute; width:20px; height:20px; background: var(--paper); border-radius:50%;
    top: 50%; margin-top:-10px;
  }
  #ekps-root .receipt::before { left:-10px; }
  #ekps-root .receipt::after { right:-10px; }
  #ekps-root .receipt-perf {
    position:absolute; left:14px; right:14px; top:50%; margin-top:-1px; border-top: 2px dashed var(--border-strong);
  }
  #ekps-root .receipt-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 14px; }
  #ekps-root .receipt-school { font-family:'Sora'; font-weight:800; font-size:14.5px; line-height:1.25; }
  #ekps-root .receipt-school-sub { font-size:10px; color:var(--slate); margin-top:2px; }
  #ekps-root .receipt-no { font-family:'IBM Plex Mono'; font-size:11px; background:var(--paper); padding:4px 8px; border-radius:5px; }
  #ekps-root .receipt-row { display:flex; justify-content:space-between; font-size:12.5px; padding: 6px 0; }
  #ekps-root .receipt-row .k { color: var(--slate); }
  #ekps-root .receipt-row .v { font-weight:600; text-align:right; }
  #ekps-root .receipt-amt-block { text-align:center; margin: 14px 0 4px 0; }
  #ekps-root .receipt-amt-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--slate); }
  #ekps-root .receipt-amt { font-family:'Sora'; font-weight:800; font-size:26px; color: var(--green); margin-top:2px; }
  #ekps-root .receipt-foot { margin-top: 44px; display:flex; justify-content:space-between; font-size:10.5px; color:var(--slate); }
  #ekps-root .receipt-sign { border-top:1px solid var(--border-strong); padding-top:5px; width:150px; text-align:center; }

  #ekps-root .receipt-picker { display:flex; gap:10px; align-items:flex-end; margin-bottom: 18px; flex-wrap:wrap; }

  #ekps-print-dual { display:none; }
  #ekps-print-dual .copy-tag { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--slate); font-weight:700; margin-bottom:6px; text-align:center; }

  @media print {
    body * { visibility: hidden; }
    #ekps-print-dual, #ekps-print-dual * { visibility: visible; }
    #ekps-print-dual {
      display:block; position: fixed; inset:0; background:#fff;
    }
    #ekps-print-dual .top-half {
      height: 148.5mm; width:100%; box-sizing:border-box; padding: 8mm 10mm;
      display:flex; align-items:stretch; gap: 6mm;
    }
    #ekps-print-dual .copy-col {
      flex:1; min-width:0; box-sizing:border-box; padding: 0 4mm; position:relative;
    }
    #ekps-print-dual .copy-col.second { border-left: 2px dashed #999; }
    #ekps-print-dual .bottom-half { height: 148.5mm; width:100%; }
    @page { size: A4 portrait; margin: 0; }
  }

  @media (max-width: 980px) {
    #ekps-root { flex-direction: column; }
    #ekps-root .sidebar { width:100%; min-height:auto; position:relative; flex-direction:row; align-items:center; overflow-x:auto; }
    #ekps-root .brand { border-bottom:none; margin-bottom:0; padding: 4px 10px; }
    #ekps-root nav.navlist { flex-direction:row; margin-top:0; }
    #ekps-root .sidebar-foot { display:none; }
    #ekps-root .kpi-grid { grid-template-columns: repeat(2,1fr); }
    #ekps-root .two-col { grid-template-columns: 1fr; }

  function todayISO(){ const d = new Date(); return d.toISOString().slice(0,10); }

  const BILL_TYPES = ['Uniform','Books / Copy','Van / Transport','Annual Charge','Exam Fee','Late Fee','Activity / Picnic','Stationery / Inventory','Other'];
  function billsTotal(s){ return Array.isArray(s.bills) ? s.bills.reduce((a,b)=>a+(parseFloat(b.amount)||0),0) : 0; }

  // cascade hoti hai. Isse agar koi student ek sath kai mahino ka advance jama karta hai,

  function otherChargeItems(s){

    items.forEach(it=>{
      const pay = it.amount > 0 ? Math.min(it.amount, remaining) : 0;
      otherChargesPaidByItem[it.key] = pay;
      remaining = Math.max(0, remaining - pay);
    });
    const otherChargesPaid = Object.values(otherChargesPaidByItem).reduce((a,v)=>a+v, 0);
    const byMonth = {};
    MONTHS.forEach(m=>{
      const fee = s.monthlyFee || 0;
      const pay = fee > 0 ? Math.min(fee, remaining) : 0;
      byMonth[m] = pay;
      remaining = Math.max(0, remaining - pay);
    });
    return { byMonth, otherChargesFull, otherChargesPaidByItem, leftover: remaining }; // leftover = other charges + poora saal ki tuition fee jama hone ke baad bacha hua advance
  }
  function monthPaidCascade(s, month){
    const alloc = monthlyAllocation(s);
    return alloc.byMonth[month] || 0;
  }
  function monthDueCascade(s, month){
    return Math.max(0, (s.monthlyFee||0) - monthPaidCascade(s, month));
  }
  function currentMonthDueOf(s){
    return monthDueCascade(s, currentMonthName());
  }
  // Aging buckets for monthly tuition dues (multi-level due statement)
  function studentDueBuckets(s){
    const curIdx = currentMonthIndex();
    const elapsed = MONTHS.slice(0, curIdx+1);
    const alloc = monthlyAllocation(s);
    const buckets = { current:0, b1_2:0, b3_5:0, b6plus:0 };
    elapsed.forEach((m, i)=>{
      const age = curIdx - i;
      const due = Math.max(0, (s.monthlyFee||0) - alloc.byMonth[m]);
      if (due <= 0) return;
      if (age === 0) buckets.current += due;
      else if (age <= 2) buckets.b1_2 += due;
      else if (age <= 5) buckets.b3_5 += due;
      else buckets.b6plus += due;
    });
    // Other Charges (Old Due/Exam/Uniform/Book/Other Bill) ab payment priority me sabse pehle clear hote hain
    const otherCharges = Math.max(0, alloc.otherChargesFull - Object.values(alloc.otherChargesPaidByItem).reduce((a,v)=>a+v,0));
    const total = buckets.current + buckets.b1_2 + buckets.b3_5 + buckets.b6plus + otherCharges;
    return Object.assign({ otherCharges, total }, buckets);
  }

  // ---------- Transport helpers ----------
  function nextRouteId(){ return transportRoutes.length ? Math.max(...transportRoutes.map(r=>r.id))+1 : 1; }
  function routeOf(s){ return transportRoutes.find(r=>r.id===s.transportRouteId); }
  function transportStudentEntries(id){ return transportEntries.filter(e=>e.studentId===id); }
  function transportTotalPaid(id){ return transportStudentEntries(id).reduce((a,e)=>a+e.amount,0); }
  function transportMonthPaid(id, month){ return transportStudentEntries(id).filter(e=>e.month===month).reduce((a,e)=>a+e.amount,0); }
  function transportTotalDue(s){
    const r = routeOf(s);
    if (!r) return 0;
    return (r.fee||0) * 12;
  }
  function nextTransportReceiptNo(){ return 'TR-' + String(transportEntries.length+1).padStart(4,'0'); }

  // ---------- Inventory helpers ----------
  function nextItemId(){ return inventoryItems.length ? Math.max(...inventoryItems.map(i=>i.id))+1 : 1; }
  function itemStock(itemId){
    return inventoryTxns.filter(t=>t.itemId===itemId).reduce((a,t)=> a + (t.type==='in' ? t.qty : -t.qty), 0);
  }
  function itemStatus(item){
    const stock = itemStock(item.id);
    if (stock <= 0) return 'Out';
    if (stock <= (item.reorderLevel||0)) return 'Low';
    return 'InStock';
  }

  // ---------- Vendor & Purchase helpers ----------
  function nextVendorId(){ return vendors.length ? Math.max(...vendors.map(v=>v.id))+1 : 1; }
  function nextPOId(){ return purchaseOrders.length ? Math.max(...purchaseOrders.map(p=>p.id))+1 : 1; }
  function nextPONo(){ return 'PO-' + String(purchaseOrders.length+1).padStart(4,'0'); }
  function poTotal(po){ return (po.items||[]).reduce((a,i)=>a+((parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0); }
  function vendorPOs(vendorId){ return purchaseOrders.filter(p=>p.vendorId===vendorId); }

  // ---------- Billing / POS helpers ----------
  function nextInvoiceId(){ return salesInvoices.length ? Math.max(...salesInvoices.map(v=>v.id))+1 : 1; }
  function nextInvoiceNo(){ return 'INV-' + String(salesInvoices.length+1).padStart(5,'0'); }
  function invoiceSubtotal(inv){ return (inv.items||[]).reduce((a,i)=>a+((parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0); }
  function invoiceTotal(inv){ return Math.max(0, invoiceSubtotal(inv) - (parseFloat(inv.discount)||0)); }
  function cartSubtotal(){ return posCart.reduce((a,i)=>a+(i.qty*i.price),0); }
  function cartTotal(){ return Math.max(0, cartSubtotal() - (parseFloat(posDiscount)||0)); }
  function cartReceived(){ return posReceived===null ? cartTotal() : Math.max(0, parseFloat(posReceived)||0); }
  function cartDue(){ return Math.max(0, cartTotal() - cartReceived()); }
  function invoiceReceived(inv){ return inv.amountReceived!=null ? inv.amountReceived : invoiceTotal(inv); }
  function invoiceDue(inv){ return Math.max(0, invoiceTotal(inv) - invoiceReceived(inv)); }
  // returned qty so far for an item within a given invoice
  function invoiceReturnedQty(invId, itemId){
    return inventoryTxns.filter(t=> t.source==='return' && t.refId===invId && t.itemId===itemId).reduce((a,t)=>a+t.qty,0);
  }
  function invoiceReturnableQty(inv, it){ return Math.max(0, it.qty - invoiceReturnedQty(inv.id, it.itemId)); }

  // ---------- Google Sheet sync (Apps Script Web App bridge) ----------
  function setSyncStatus(status, msg){
    syncStatus = status; syncStatusMsg = msg || '';
    const el = document.getElementById('ekps-sync-indicator');
    if (el) el.outerHTML = syncIndicatorHtml();
  }
  function syncIndicatorHtml(){
    const map = {
      idle: ['#9AA5B8', 'Google Sheet Connected'],
      syncing: ['#B9862A', 'Google Sheet se sync ho raha hai&hellip;'],
      synced: ['#2F8F5B', 'Google Sheet se sync&nbsp;✓'],
      error: ['#C1502E', 'Sync fail — ' + esc(syncStatusMsg || 'connection error')],
      offline: ['#C1502E', 'Offline — localStorage se data dikh raha hai']
    };
    const [color, label] = map[syncStatus] || map.idle;
    return `<span id="ekps-sync-indicator" style="display:inline-flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;"></span>${label}</span>`;
  }
  function gasConfigured(){ return !!(GAS_URL && GAS_URL.trim()); }
  function gsRequestGetAll(){
    return fetch(GAS_URL + (GAS_URL.includes('?') ? '&' : '?') + 'action=get', { method:'GET' })
      .then(r=>r.json());
  }
  function gsRequestSet(key, value){
    return fetch(GAS_URL, {
      method:'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify({ action:'set', key, value: JSON.stringify(value) })
    }).then(r=>r.json());
  }
  function pushToSheet(key, value){
    if (!gasConfigured()) return;
    setSyncStatus('syncing');
    gsRequestSet(key, value).then(res=>{
      if (res && res.ok) setSyncStatus('synced');
      else setSyncStatus('error', (res && res.error) || 'unknown');
    }).catch(err=>{ setSyncStatus('error', err.message || 'network error'); });
  }

  // ---------- auto backup ----------
  const AUTO_BACKUP_MIN_GAP_MS = 3 * 60 * 1000; 
  const AUTO_BACKUP_KEEP = 5;
  function saveAutoBackups(){
    try { localStorage.setItem('ekps_autobackups', JSON.stringify(autoBackups)); }
    catch(e){ console.error('save autobackups failed', e); }
  }
  function snapshotNow(){
    autoBackups.push({
      ts: Date.now(),
      students: JSON.parse(JSON.stringify(students)),
      entries: JSON.parse(JSON.stringify(entries)),
      admissions: JSON.parse(JSON.stringify(admissions)),
      transportRoutes: JSON.parse(JSON.stringify(transportRoutes)),
      transportEntries: JSON.parse(JSON.stringify(transportEntries)),
      inventoryItems: JSON.parse(JSON.stringify(inventoryItems)),
      inventoryTxns: JSON.parse(JSON.stringify(inventoryTxns)),
      vendors: JSON.parse(JSON.stringify(vendors)),
      purchaseOrders: JSON.parse(JSON.stringify(purchaseOrders)),
      salesInvoices: JSON.parse(JSON.stringify(salesInvoices)),
    });
    if (autoBackups.length > AUTO_BACKUP_KEEP) autoBackups = autoBackups.slice(-AUTO_BACKUP_KEEP);
    saveAutoBackups();
  }
  function maybeAutoBackup(){
    if (!ready) return;
    const last = autoBackups.length ? autoBackups[autoBackups.length-1].ts : 0;
    if (Date.now() - last < AUTO_BACKUP_MIN_GAP_MS) return;
    snapshotNow();
  }
  setInterval(()=>{ if (ready) maybeAutoBackup(); }, 5 * 60 * 1000);

    promotion: ['Session Promotion','Naye saal ke liye bacchon ko agli class me promote karein'],
    exams: ['Exam Manager & Admit Card','School settings, exams aur admit card printing'],
    backup: ['Backup & Sync','Google Sheet Sync + snapshots and manual backups'],
    admincontrols: ['Admin Controls','User/Staff ko module-wise access dein ya hataayein'],

  // ---------- Access control helpers ----------
  function userHasAccess(navId){
    if (currentUserRole === 'admin') return true;
    if (navId === 'admincontrols') return false;
    if (navId === 'dashboard') return true;
    return !!userPermissions[navId];
  }
  function canSeeNav(n){
    if (n.id === 'admincontrols') return currentUserRole === 'admin';
    return userHasAccess(n.id);
  }
  function isAdmin(){ return currentUserRole === 'admin'; }

  function renderNav(){
    const allowedNav = NAV.filter(n => canSeeNav(n));
    
    let navHtml = allowedNav.map(n => `
      <div class="navitem ${route===n.id?'active':''}" data-route="${n.id}">
        ${ICONS[n.icon]}<span>${n.label}</span>
      </div>`).join('');
      
    navHtml += `
      <div class="navitem" id="nav-pass-manage" style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
        ${ICONS.password}<span>Manage Password</span>
      </div>`;

    navEl.innerHTML = navHtml;
    navEl.querySelectorAll('.navitem').forEach(el => {
      if(el.id === 'nav-pass-manage'){
        el.addEventListener('click', () => passwordManagementModal());
      } else {
        el.addEventListener('click', () => { route = el.dataset.route; render(); });
      }
    });
  }

  function go(r){ 
    const targetNav = NAV.find(n => n.id === r);
    if(targetNav && !canSeeNav(targetNav)){
      toast('Access Denied: Aap is section ko open nahi kar sakte.');
      return;
    }
    route = r; 
    render(); 
  }

  // ---------- DASHBOARD ----------
  function renderDashboard(){
    const demand = students.reduce((a,s)=>a+totalDue(s),0);
    const collected = students.reduce((a,s)=>a+totalPaid(s.id),0);
    const pending = demand - collected;
    const paidCount = students.filter(s=>statusOf(s)==='Paid').length;

    const byClass = {};
    students.forEach(s=>{
      byClass[s.cls] = byClass[s.cls] || {due:0, paid:0};
      byClass[s.cls].due += totalDue(s);
      byClass[s.cls].paid += totalPaid(s.id);
    });
    const maxDue = Math.max(1, ...Object.values(byClass).map(v=>v.due));
    const classRows = CLASS_ORDER.filter(c=>byClass[c]).map(c=>{
      const v = byClass[c];
      const pct = Math.round((v.due? (v.due-v.paid)/v.due : 0)*100);
      return `<div class="classbar-row">
        <div class="classbar-label">${c}</div>
        <div class="classbar-track"><div class="classbar-fill" style="width:${Math.max(4, (v.due/maxDue)*100)}%"></div></div>
        <div class="classbar-val">${fmt(v.due-v.paid)} due</div>
      </div>`;
    }).join('') || `<div class="empty-state">Koi class data nahi</div>`;

    const recent = entries.slice().sort((a,b)=> (b.date||'').localeCompare(a.date||'') || b.id-a.id).slice(0,6);
    const recentRows = recent.map(e=>{
      const s = students.find(x=>x.id===e.studentId);
      return `<div class="recent-row">
        <div><div class="recent-name">${esc(s?s.name:'Unknown')}</div>
        <div class="recent-meta">${esc(e.month)} &middot; ${fmtDate(e.date)} &middot; ${esc(e.receiptNo)}</div></div>
        <div class="recent-amt">+${fmt(e.amount)}</div>
      </div>`;
    }).join('') || `<div class="empty-state" style="padding:24px 10px;">Abhi tak koi entry nahi hui.<br><span class="hint">Fee Collection tab se pehli entry daalein.</span></div>`;

    contentEl.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card" style="--accent:var(--ink)">
          <div class="kpi-label">Total Estimated Demand</div>
          <div class="kpi-value">${fmt(demand)}</div>
          <div class="kpi-note">${students.length} students enrolled</div>
        </div>
        <div class="kpi-card" style="--accent:var(--green)">
          <div class="kpi-label">Total Collected</div>
          <div class="kpi-value">${fmt(collected)}</div>
          <div class="kpi-note">${entries.length} entries recorded</div>
        </div>
        <div class="kpi-card" style="--accent:var(--rust)">
          <div class="kpi-label">Net Dues Pending</div>
          <div class="kpi-value">${fmt(pending)}</div>
          <div class="kpi-note">${students.length-paidCount} students with dues</div>
        </div>
        <div class="kpi-card" style="--accent:var(--saffron)">
          <div class="kpi-label">Fully Paid</div>
          <div class="kpi-value">${paidCount} / ${students.length}</div>
          <div class="kpi-note">${students.length? Math.round(paidCount/students.length*100):0}% students clear</div>
        </div>
      </div>
      <div class="two-col">
        <div class="panel">
          <div class="panel-head"><h3>Class-wise Pending Dues</h3></div>
          <div class="panel-body">${classRows}</div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>Recent Collections</h3>
            <span class="btn btn-ghost btn-sm" id="ekps-goto-collect">+ New Entry</span></div>
          <div class="panel-body">${recentRows}</div>
        </div>
      </div>`;
    document.getElementById('ekps-goto-collect').addEventListener('click', ()=>go('collect'));
  }

            ${recent.length ? recent.map(e=>{
              const s = students.find(x=>x.id===e.studentId);
              return `<div class="recent-row" data-created-by="${e.createdBy||'admin'}">
                <div><div class="recent-name">${esc(s?s.name:'—')} <span class="id-chip">${e.receiptNo}</span> ${e.createdBy==='user'?'<span class="entry-badge-user">Staff Entry</span>':''}</div>

                  ${isAdmin() ? `<div class="icon-btn js-del-btn" data-del-entry="${e.id}" title="Delete">${ICONS.trash}</div>` : ''}
                </div>
              </div>`;
            }).join('') : `<div class="empty-state">Koi entry nahi</div>`}
          </div>
        </div>
      </div>`;

    let pickedId = null;
    const input = document.getElementById('ekps-student-input');
    const preview = document.getElementById('ekps-pick-preview');
    input.addEventListener('input', ()=>{
      const m = input.value.match(/^(\d+)\s*—/);
      if (m) {
        const s = students.find(x=>x.id===parseInt(m[1]));
        if (s) {
          pickedId = s.id;
          const due = totalDue(s), paid = totalPaid(s.id), rest = due-paid;
          preview.className = 'pick-preview show';
          preview.innerHTML = `<b>${esc(s.name)}</b> &middot; Class ${esc(s.cls)} &middot; Rest Due: <b>${fmt(rest)}</b>`;
          return;
        }
      }
      pickedId = null;
      preview.className = 'pick-preview';
    });

    document.getElementById('ekps-save-entry').addEventListener('click', ()=>{
      const month = document.getElementById('ekps-month-input').value;
      const amount = parseFloat(document.getElementById('ekps-amount-input').value);
      const date = document.getElementById('ekps-date-input').value;
      if (!pickedId) { toast('Pehle ek valid Student select karein'); input.focus(); return; }
      if (!month) { toast('Month select karein'); return; }
      if (!amount || amount<=0) { toast('Sahi Paid Amount daalein'); return; }
      if (!date) { toast('Payment Date daalein'); return; }
      const entry = { id: Date.now(), receiptNo: nextReceiptNo(), studentId: pickedId, month, amount, date, createdBy: currentUserRole };
      entries.push(entry);
      saveEntries();
      toast('Entry saved — Ledger updated');
      renderCollect();
      const s2 = students.find(x=>x.id===pickedId);
      if (s2 && waPhone(s2.mobNo)) {
        if (confirm('Payment confirmation WhatsApp par bhejein — ' + s2.name + '?')) {
          sendPaymentReceiptWhatsApp(entry.id, 'fee');
        }
      }
    });

    contentEl.querySelectorAll('[data-wa-payment]').forEach(el=>{
      el.addEventListener('click', ()=> sendPaymentReceiptWhatsApp(parseInt(el.dataset.waPayment), 'fee'));
    });

    contentEl.querySelectorAll('[data-del-entry]').forEach(el=>{
      el.addEventListener('click', ()=>{
        if(!isAdmin()){ toast('Access Denied: Entry delete karne ki permission sirf Admin ko hai'); return; }
        if(!confirm('Ye entry delete karein?')) return;
        entries = entries.filter(e=>e.id !== parseInt(el.dataset.delEntry));
        saveEntries();
        toast('Entry deleted');
        renderCollect();
      });
    });
  }

        fatherName,
        address,

        bills: s.bills || [],

        students.push(rec);
      }
      saveStudents();
      toast(editing?'Student updated':'Student added');
      close();
      renderStudents();
    });
  }

                  </div>`).join('') : `<div class="empty-state" style="padding:14px;">Abhi tak koi extra bill nahi jode gaye</div>`}

      document.getElementById('ekps-bill-close').addEventListener('click', close);
      document.getElementById('ekps-bill-done').addEventListener('click', ()=>{ close(); renderStudents(); });

      const typeSel = document.getElementById('bl-type');

          toast('Bill removed');
          draw();
        });
      });
    }
    draw();
  }

  // ---------- BULK BILL (Class-wise, add same bill to many students at once) ----------
  let bulkBillClass = 'all';
  let bulkBillSelected = {};

  function bulkBillModal(){
    bulkBillClass = 'all';

    students.forEach(s=>{ bulkBillSelected[s.id] = true; });
    drawBulkBillModal();

    const classes = ['all', ...CLASS_ORDER.filter(c=>students.some(s=>s.cls===c))];

      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    const selCount = list.filter(s=>bulkBillSelected[s.id]).length;
    const allChecked = list.length>0 && list.every(s=>bulkBillSelected[s.id]);

    modalRoot.innerHTML = `

            </div>
            <div class="field">
              <label>Class</label>
              <select id="bb-cls">${classes.map(c=>`<option value="${c}" ${c===bulkBillClass?'selected':''}>${c==='all'?'All Classes':c}</option>`).join('')}</select>
            </div>
            <div class="promo-selectall" style="display:flex; align-items:center; gap:8px; margin:10px 0 6px 0;">

    syncCustom();

    document.getElementById('bb-cls').addEventListener('change', (e)=>{
      bulkBillClass = e.target.value;
      // reset selection to "all selected" for the newly filtered list
      const newList = students.filter(s=> bulkBillClass==='all' || s.cls===bulkBillClass);
      newList.forEach(s=>{ if (bulkBillSelected[s.id]===undefined) bulkBillSelected[s.id] = true; });
      drawBulkBillModal();

      list.forEach(s=>{ bulkBillSelected[s.id] = e.target.checked; });
      drawBulkBillModal();
    });

      el.addEventListener('change', ()=>{
        bulkBillSelected[parseInt(el.dataset.bbCheck)] = el.checked;
        drawBulkBillModal();
      });
    });

    document.getElementById('ekps-bb-save').addEventListener('click', ()=>{
      const type = typeSel.value==='Other' ? (document.getElementById('bb-custom').value.trim() || 'Other') : typeSel.value;
      const amount = parseFloat(document.getElementById('bb-amount').value);
      const date = document.getElementById('bb-date').value;
      const note = document.getElementById('bb-note').value.trim();
      if (!amount || amount<=0) { toast('Sahi Amount daalein'); return; }
      if (!date) { toast('Date daalein'); return; }
      const targets = list.filter(s=>bulkBillSelected[s.id]);
      if (!targets.length) { toast('Kam se kam ek student select karein'); return; }
      targets.forEach(s=>{
        if (!Array.isArray(s.bills)) s.bills = [];
        s.bills.push({ id: Date.now() + Math.floor(Math.random()*10000), type, amount, date, note, createdBy: currentUserRole });
      });
      saveStudents();
      toast(`Bill add ho gaya — ${targets.length} student(s) ko`);
      close();
      renderStudents();
    });
  }

    contentEl.querySelectorAll('[data-bill]').forEach(el=> el.addEventListener('click', ()=>{ billModal(parseInt(el.dataset.bill)); }));
    contentEl.querySelectorAll('[data-del]').forEach(el=> el.addEventListener('click', ()=>{
      if(!isAdmin()){ toast('Access Denied: Student delete karne ki permission sirf Admin ko hai'); return; }
      if(!confirm('Ye student delete karein? Iski saari payment entries bhi hat jayengi.')) return;
      const id = parseInt(el.dataset.del);
      students = students.filter(s=>s.id!==id);

    body.querySelectorAll('[data-rt-del]').forEach(el=> el.addEventListener('click', ()=>{
      if(!isAdmin()){ toast('Access Denied: Route delete karne ki permission sirf Admin ko hai'); return; }

      students.forEach(s=>{ if (s.transportRouteId===id) s.transportRouteId = null; });

  function renderTransportAssign(){
    const body = document.getElementById('ekps-tr-body');
    if (!transportRoutes.length) {
      body.innerHTML = `<div class="empty-state">Pehle "Routes & Vehicles" tab se ek route banayein.</div>`;
      return;
    }
    const classes = ['all', ...CLASS_ORDER.filter(c=>students.some(s=>s.cls===c))];
    const list = students.filter(s=> transportAssignClsFilter==='all' || s.cls===transportAssignClsFilter)
      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    body.innerHTML = `
      <div class="toolbar">
        <select id="tr-cls-filter">${classes.map(c=>`<option value="${c}" ${c===transportAssignClsFilter?'selected':''}>${c==='all'?'All Classes':c}</option>`).join('')}</select>
      </div>
      <div class="panel">
        <div class="panel-body" style="padding:0; overflow:auto;">
          <table class="data">
            <thead><tr><th>ID</th><th>Class</th><th>Name</th><th>Assigned Route</th></tr></thead>
            <tbody>
              ${list.length ? list.map(s=>`
                <tr>
                  <td><span class="id-chip">${s.id}</span></td>
                  <td><span class="cls-chip">${esc(s.cls)}</span></td>
                  <td style="font-weight:600;">${esc(s.name)}</td>
                  <td>
                    <select data-assign-route="${s.id}">
                      <option value="">— No Transport —</option>
                      ${transportRoutes.map(r=>`<option value="${r.id}" ${s.transportRouteId===r.id?'selected':''}>${esc(r.name)} (${fmt(r.fee)}/mo)</option>`).join('')}
                    </select>
                  </td>
                </tr>`).join('') : `<tr><td colspan="4"><div class="empty-state">Is class me koi student nahi hai</div></td></tr>`}
            </tbody>
          </table>
        </div>

    document.getElementById('tr-cls-filter').addEventListener('change', e=>{ transportAssignClsFilter = e.target.value; renderTransportAssign(); });
    body.querySelectorAll('[data-assign-route]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const id = parseInt(el.dataset.assignRoute);
        const s = students.find(x=>x.id===id);
        if (!s) return;
        s.transportRouteId = el.value ? parseInt(el.value) : null;
        saveStudents();
        toast('Transport route update ho gaya — ' + s.name);

              </div>`;
            }).join('') : `<div class="empty-state">Koi entry nahi</div>`}
          </div>
        </div>
      </div>
      <div class="panel" style="margin-top:16px;">
        <div class="panel-head"><h3>Transport Fee Status (Assigned Students)</h3></div>
        <div class="panel-body" style="padding:0; overflow:auto;">
          <table class="data">
            <thead><tr><th>ID</th><th>Name</th><th>Route</th><th>Total Due (Yr)</th><th>Paid</th><th>Rest Due</th></tr></thead>
            <tbody>
              ${assignedStudents.length ? assignedStudents.map(s=>{
                const due = transportTotalDue(s), paid = transportTotalPaid(s.id), rest = due-paid;
                return `<tr>
                  <td><span class="id-chip">${s.id}</span></td>
                  <td style="font-weight:600;">${esc(s.name)}</td>
                  <td>${esc(routeOf(s)?routeOf(s).name:'—')}</td>
                  <td class="mono">${fmt(due)}</td>
                  <td class="mono">${fmt(paid)}</td>
                  <td class="mono">${fmt(rest)}</td>
                </tr>`;
              }).join('') : `<tr><td colspan="6"><div class="empty-state">Koi student transport assigned nahi hai</div></td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;

    let pickedId = null;
    const input = document.getElementById('tr-student-input');
    const preview = document.getElementById('tr-pick-preview');
    input.addEventListener('input', ()=>{
      const m = input.value.match(/^(\d+)\s*—/);
      if (m) {
        const s = students.find(x=>x.id===parseInt(m[1]) && x.transportRouteId);
        if (s) {
          pickedId = s.id;
          const due = transportTotalDue(s), paid = transportTotalPaid(s.id), rest = due-paid;
          preview.className = 'pick-preview show';
          preview.innerHTML = `<b>${esc(s.name)}</b> &middot; Route: ${esc(routeOf(s)?routeOf(s).name:'—')} &middot; Rest Due: <b>${fmt(rest)}</b>`;
          return;
        }
      }
      pickedId = null;
      preview.className = 'pick-preview';
    });

    document.getElementById('tr-save-entry').addEventListener('click', ()=>{
      const month = document.getElementById('tr-month-input').value;
      const amount = parseFloat(document.getElementById('tr-amount-input').value);
      const date = document.getElementById('tr-date-input').value;
      if (!pickedId) { toast('Pehle ek valid transport-assigned Student select karein'); input.focus(); return; }
      if (!month) { toast('Month select karein'); return; }
      if (!amount || amount<=0) { toast('Sahi Paid Amount daalein'); return; }
      if (!date) { toast('Payment Date daalein'); return; }
      const entry = { id: Date.now(), receiptNo: nextTransportReceiptNo(), studentId: pickedId, month, amount, date, createdBy: currentUserRole };
      transportEntries.push(entry);
      saveTransportEntries();
      toast('Transport entry saved');
      renderTransportCollect();
      const s2 = students.find(x=>x.id===pickedId);
      if (s2 && waPhone(s2.mobNo)) {
        if (confirm('Payment confirmation WhatsApp par bhejein — ' + s2.name + '?')) {
          sendPaymentReceiptWhatsApp(entry.id, 'transport');
        }
      }
    });

    body.querySelectorAll('[data-wa-payment-tr]').forEach(el=>{
      el.addEventListener('click', ()=> sendPaymentReceiptWhatsApp(parseInt(el.dataset.waPaymentTr), 'transport'));
    });

    body.querySelectorAll('[data-del-tr-entry]').forEach(el=>{
      el.addEventListener('click', ()=>{
        if(!isAdmin()){ toast('Access Denied: Entry delete karne ki permission sirf Admin ko hai'); return; }
        if(!confirm('Ye transport entry delete karein?')) return;
        transportEntries = transportEntries.filter(e=>e.id !== parseInt(el.dataset.delTrEntry));
        saveTransportEntries();
        toast('Entry deleted');
        renderTransportCollect();
      });
    });
  }

  // ---------- Inventory: Dashboard & Analytics ----------
  function renderInventoryDashboard(){
    const body = document.getElementById('ekps-inv-body');
    const totalValue = inventoryItems.reduce((a,i)=>a + itemStock(i.id)*i.unitPrice, 0);
    const lowStock = inventoryItems.filter(i=>itemStatus(i)!=='InStock');
    const today = todayISO();
    const todaySales = salesInvoices.filter(v=>v.date===today);
    const todaySalesAmt = todaySales.reduce((a,v)=>a+invoiceTotal(v),0);
    const thisMonth = today.slice(0,7);
    const monthPurchaseAmt = purchaseOrders.filter(p=>(p.date||'').slice(0,7)===thisMonth).reduce((a,p)=>a+poTotal(p),0);
    const monthSalesAmt = salesInvoices.filter(v=>(v.date||'').slice(0,7)===thisMonth).reduce((a,v)=>a+invoiceTotal(v),0);
    const monthNetProfit = monthSalesAmt - monthPurchaseAmt;
    const totalDueAmt = salesInvoices.reduce((a,v)=>a+invoiceDue(v),0);
    const monthDamageQty = inventoryTxns.filter(t=>t.source==='damage' && (t.date||'').slice(0,7)===thisMonth).reduce((a,t)=>a+t.qty,0);

    // category-wise stock value
    const cats = {};
    inventoryItems.forEach(i=>{ const v = itemStock(i.id)*i.unitPrice; cats[i.category] = (cats[i.category]||0) + v; });
    const maxCat = Math.max(1, ...Object.values(cats));

    // top selling items (by qty, from sale-sourced stock-out txns)
    const soldQty = {};
    inventoryTxns.filter(t=>t.type==='out' && t.source==='sale').forEach(t=>{ soldQty[t.itemId] = (soldQty[t.itemId]||0) + t.qty; });
    const topSelling = Object.entries(soldQty).sort((a,b)=>b[1]-a[1]).slice(0,5)
      .map(([id,qty])=>({ item: inventoryItems.find(i=>i.id===parseInt(id)), qty }))
      .filter(x=>x.item);
    const maxSold = Math.max(1, ...topSelling.map(x=>x.qty));

    const recentSales = salesInvoices.slice().sort((a,b)=>b.id-a.id).slice(0,6);
    const recentPurchases = purchaseOrders.slice().sort((a,b)=>b.id-a.id).slice(0,6);

    body.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card" style="--accent:var(--green)"><div class="kpi-label">Total Stock Value</div><div class="kpi-value">${fmt(totalValue)}</div><div class="kpi-note">${inventoryItems.length} items tracked</div></div>
        <div class="kpi-card" style="--accent:var(--rust)"><div class="kpi-label">Low / Out of Stock</div><div class="kpi-value">${lowStock.length}</div><div class="kpi-note">Reorder-level se neeche</div></div>
        <div class="kpi-card" style="--accent:var(--saffron)"><div class="kpi-label">Today's Sales</div><div class="kpi-value">${fmt(todaySalesAmt)}</div><div class="kpi-note">${todaySales.length} bill(s) aaj</div></div>
        <div class="kpi-card" style="--accent:var(--ink)"><div class="kpi-label">This Month Purchases</div><div class="kpi-value">${fmt(monthPurchaseAmt)}</div><div class="kpi-note">${vendors.length} active vendors</div></div>
      </div>
      <div class="stat-strip">
        <div class="kpi-card" style="--accent:var(--green)"><div class="kpi-label">This Month Sales</div><div class="kpi-value">${fmt(monthSalesAmt)}</div></div>
        <div class="kpi-card" style="--accent:${monthNetProfit>=0?'var(--green)':'var(--rust)'}"><div class="kpi-label">This Month Net Profit</div><div class="kpi-value">${fmt(monthNetProfit)}</div><div class="kpi-note">Sale − Purchase</div></div>
        <div class="kpi-card" style="--accent:var(--rust)"><div class="kpi-label">Outstanding Bill Dues</div><div class="kpi-value">${fmt(totalDueAmt)}</div><div class="kpi-note">POS bills se pending</div></div>
        <div class="kpi-card" style="--accent:var(--amber)"><div class="kpi-label">Damage / Loss (This Month)</div><div class="kpi-value">${monthDamageQty}</div><div class="kpi-note">units damaged</div></div>
      </div>
      <div class="two-col">
        <div class="panel">
          <div class="panel-head"><h3>Category-wise Stock Value</h3></div>
          <div class="panel-body">
            ${Object.keys(cats).length ? Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`

  function poModal(){
    poDraftItems = [{ itemId: inventoryItems[0]?inventoryItems[0].id:null, qty:1, price: inventoryItems[0]?inventoryItems[0].unitPrice:0 }];
    poDraftVendorId = vendors[0] ? vendors[0].id : null;

  function renderPOModalBody(){
    if (!inventoryItems.length) { toast('Pehle Stock & Inventory me item add karein'); return; }
    if (!vendors.length) { toast('Pehle ek Vendor add karein'); return; }
    const total = poDraftItems.reduce((a,r)=>a+((parseFloat(r.qty)||0)*(parseFloat(r.price)||0)),0);
    modalRoot.innerHTML = `
      <div class="modal-backdrop" id="ekps-po-bg">
        <div class="modal modal-lg">
          <div class="modal-head"><h3>New Purchase Order</h3><div class="icon-btn" id="ekps-po-close">✕</div></div>

            <div class="form-grid">
              <div class="field" style="grid-column:span 2;"><label>Vendor</label>

              </div>

            </div>
            <div class="field"><label>Items — Received / stock ho jayega automatically save karte hi</label></div>
            <div id="po-lines">
              ${poDraftItems.map((r,idx)=>`
                <div class="po-line" data-po-row="${idx}">
                  <select data-po-item="${idx}">${inventoryItems.map(i=>`<option value="${i.id}" ${i.id===r.itemId?'selected':''}>${esc(i.name)}</option>`).join('')}</select>
                  <input type="number" min="1" placeholder="Qty" data-po-qty="${idx}" value="${r.qty}"/>
                  <input type="number" min="0" placeholder="Price" data-po-price="${idx}" value="${r.price}"/>
                  <div class="mono" style="text-align:right; font-weight:700;">${fmt((parseFloat(r.qty)||0)*(parseFloat(r.price)||0))}</div>
                  <div class="icon-btn" data-po-remove="${idx}">${ICONS.trash}</div>
                </div>`).join('')}
            </div>
            <span class="btn btn-ghost btn-sm" id="po-add-line">+ Add Item Row</span>
            <div class="cart-totals">
              <div class="ct-row ct-grand"><span>Purchase Total</span><span>${fmt(total)}</span></div>
            </div>
          </div>
          <div class="modal-foot">
            <span class="btn btn-ghost" id="ekps-po-cancel">Cancel</span>
            <span class="btn btn-primary" id="ekps-po-save">Save & Auto-Receive Stock</span>
          </div>
        </div>
      </div>`;
    const close = ()=>{ modalRoot.innerHTML=''; };
    document.getElementById('ekps-po-bg').addEventListener('click', e=>{ if(e.target.id==='ekps-po-bg') close(); });
    document.getElementById('ekps-po-close').addEventListener('click', close);
    document.getElementById('ekps-po-cancel').addEventListener('click', close);
    document.getElementById('po-vendor').addEventListener('change', e=>{ poDraftVendorId = parseInt(e.target.value); });
    document.getElementById('po-add-line').addEventListener('click', ()=>{
      poDraftItems.push({ itemId: inventoryItems[0]?inventoryItems[0].id:null, qty:1, price: inventoryItems[0]?inventoryItems[0].unitPrice:0 });
      renderPOModalBody();
    });
    modalRoot.querySelectorAll('[data-po-item]').forEach(el=>el.addEventListener('change', e=>{
      const idx = parseInt(el.dataset.poItem); const item = inventoryItems.find(i=>i.id===parseInt(e.target.value));
      poDraftItems[idx].itemId = item.id; poDraftItems[idx].price = item.unitPrice; renderPOModalBody();
    }));
    modalRoot.querySelectorAll('[data-po-qty]').forEach(el=>el.addEventListener('input', e=>{
      poDraftItems[parseInt(el.dataset.poQty)].qty = e.target.value;
      document.querySelectorAll('.ct-grand span:last-child')[0].textContent = fmt(poDraftItems.reduce((a,r)=>a+((parseFloat(r.qty)||0)*(parseFloat(r.price)||0)),0));
    }));
    modalRoot.querySelectorAll('[data-po-price]').forEach(el=>el.addEventListener('input', e=>{
      poDraftItems[parseInt(el.dataset.poPrice)].price = e.target.value;
      document.querySelectorAll('.ct-grand span:last-child')[0].textContent = fmt(poDraftItems.reduce((a,r)=>a+((parseFloat(r.qty)||0)*(parseFloat(r.price)||0)),0));
    }));
    modalRoot.querySelectorAll('[data-po-remove]').forEach(el=>el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.poRemove);
      if (poDraftItems.length<=1) { toast('Kam se kam 1 item chahiye'); return; }
      poDraftItems.splice(idx,1);
      renderPOModalBody();
    }));
    document.getElementById('ekps-po-save').addEventListener('click', ()=>{
      const date = document.getElementById('po-date').value;
      if (!poDraftVendorId) { toast('Vendor select karein'); return; }
      if (!date) { toast('Date daalein'); return; }
      const cleanItems = poDraftItems.filter(r=>r.itemId && (parseFloat(r.qty)||0)>0);
      if (!cleanItems.length) { toast('Kam se kam ek valid item row daalein'); return; }
      const po = { id: nextPOId(), poNo: nextPONo(), vendorId: poDraftVendorId, date,
        items: cleanItems.map(r=>({ itemId: r.itemId, qty: parseFloat(r.qty)||0, price: parseFloat(r.price)||0 })),
        createdBy: currentUserRole };
      purchaseOrders.push(po);
      savePurchaseOrders();
      // AUTOMATION: auto stock-in for every line item, no separate manual step needed
      const vendor = vendors.find(v=>v.id===poDraftVendorId);
      po.items.forEach(it=>{
        inventoryTxns.push({ id: Date.now()+Math.floor(Math.random()*1000), itemId: it.itemId, type:'in', qty: it.qty, date,
          note: `Purchase ${po.poNo} — ${vendor?vendor.name:'Vendor'}`, source:'purchase', refId: po.id, createdBy: currentUserRole });
      });
      saveInventoryTxns();
      toast('Purchase order saved — stock automatically updated');
      close();
      renderInventoryVendors();
    });
  }

      .sort((a,b)=>a.name.localeCompare(b.name));
    const recentInvoices = salesInvoices.slice().sort((a,b)=>b.id-a.id).slice(0,8);

          <div class="panel-body">
            <div class="form-grid" style="grid-template-columns:1fr 1fr;">

                <select id="pos-cust-type">
                  <option value="walkin" ${posCustomerType==='walkin'?'selected':''}>Walk-in Customer</option>
                  <option value="student" ${posCustomerType==='student'?'selected':''}>School Student</option>
                </select>
              </div>
              <div class="field"><label>Payment Mode</label>
                <select id="pos-pay-mode">
                  ${['Cash','UPI','Card','Bank Transfer'].map(m=>`<option ${m===posPaymentMode?'selected':''}>${m}</option>`).join('')}
                </select>
              </div>
            </div>
            <div id="pos-cust-fields">
              ${posCustomerType==='student' ? `
                <div class="field"><label>Student (ID ya naam type karein)</label>
                  <input type="text" id="pos-student-input" list="pos-student-list" autocomplete="off" placeholder="e.g. 12 — Rahul Kumar" value="${posPickedStudent?(posPickedStudent.id+' — '+posPickedStudent.name):''}"/>
                  <datalist id="pos-student-list">
                    ${students.map(s=>`<option value="${s.id} — ${esc(s.name)} (${esc(s.cls)})">`).join('')}
                  </datalist>
                </div>
                <div class="pick-preview ${posPickedStudent?'show':''}" id="pos-pick-preview">${posPickedStudent ? `<b>${esc(posPickedStudent.name)}</b> &middot; Class ${esc(posPickedStudent.cls)}` : ''}</div>` : `
                <div class="form-grid" style="grid-template-columns:1fr 1fr;">
                  <div class="field"><label>Customer Name</label><input type="text" id="pos-cust-name" value="${esc(posCustomerName)}" placeholder="Optional"/></div>
                  <div class="field"><label>Phone</label><input type="text" id="pos-cust-phone" value="${esc(posCustomerPhone)}" placeholder="Optional"/></div>
                </div>`}
            </div>
            <div id="pos-cart-rows">
              ${posCart.length ? posCart.map((c,idx)=>`
                <div class="cart-row">
                  <span class="cr-nm">${esc(c.name)}</span>
                  <input type="number" min="1" class="cr-qty" data-cart-qty="${idx}" value="${c.qty}"/>
                  <span class="cr-price">${fmt(c.price)}</span>
                  <span class="cr-line">${fmt(c.qty*c.price)}</span>
                  <div class="icon-btn" data-cart-remove="${idx}">${ICONS.trash}</div>
                </div>`).join('') : `<div class="empty-state">Cart khali hai — left side se item click karein</div>`}
            </div>

              <div class="field"><label>Amount Received (₹)</label><input type="number" min="0" id="pos-received" value="${cartReceived()}"/></div>

            <div class="cart-totals">
              <div class="ct-row"><span>Subtotal</span><span>${fmt(cartSubtotal())}</span></div>

              ${posCustomerType==='student' ? 'Baaki ₹'+fmt(cartDue())+' is student ke main school bill me due ki tarah add ho jayega.' : 'Walk-in customer ka due track nahi hota — poora payment lena behtar hai.'}

              ${recentInvoices.length ? recentInvoices.map(v=>{ const due = invoiceDue(v); return `<tr data-created-by="${v.createdBy||'admin'}">

    document.getElementById('pos-search').addEventListener('input', e=>{ posQ = e.target.value; renderInventoryBilling(); });
    document.getElementById('pos-clear').addEventListener('click', ()=>{ posCart=[]; posDiscount=0; posReceived=null; renderInventoryBilling(); });
    document.getElementById('pos-cust-type').addEventListener('change', e=>{ posCustomerType = e.target.value; posStudentPick=null; renderInventoryBilling(); });
    document.getElementById('pos-pay-mode').addEventListener('change', e=>{ posPaymentMode = e.target.value; });
    document.getElementById('pos-discount').addEventListener('input', e=>{ posDiscount = parseFloat(e.target.value)||0; renderInventoryBilling(); });
    document.getElementById('pos-received').addEventListener('input', e=>{ posReceived = e.target.value===''? 0 : parseFloat(e.target.value)||0; renderInventoryBilling(); });

    if (posCustomerType==='student') {
      const input = document.getElementById('pos-student-input');
      const preview = document.getElementById('pos-pick-preview');
      input.addEventListener('input', ()=>{
        const m = input.value.match(/^(\d+)\s*—/);
        const s = m ? students.find(x=>x.id===parseInt(m[1])) : null;
        posStudentPick = s ? s.id : null;
        if (s) {
          preview.className = 'pick-preview show';
          preview.innerHTML = `<b>${esc(s.name)}</b> &middot; Class ${esc(s.cls)}`;
        } else {
          preview.className = 'pick-preview';
          preview.innerHTML = '';
        }
      });
    } else {
      document.getElementById('pos-cust-name').addEventListener('input', e=>{ posCustomerName = e.target.value; });
      document.getElementById('pos-cust-phone').addEventListener('input', e=>{ posCustomerPhone = e.target.value; });
    }

    body.querySelectorAll('[data-pos-add]').forEach(el=>el.addEventListener('click', ()=>{
      const id = parseInt(el.dataset.posAdd);
      const item = inventoryItems.find(i=>i.id===id);
      if (!item) return;
      if (itemStock(id) <= 0) { toast('Ye item stock me nahi hai'); return; }
      const existing = posCart.find(c=>c.itemId===id);
      if (existing) existing.qty += 1;
      else posCart.push({ itemId:id, name:item.name, price:item.unitPrice, qty:1, unit:item.unit });
      renderInventoryBilling();
    }));
    body.querySelectorAll('[data-cart-qty]').forEach(el=>el.addEventListener('input', e=>{
      const idx = parseInt(el.dataset.cartQty);
      posCart[idx].qty = Math.max(1, parseFloat(e.target.value)||1);
      renderInventoryBilling();
    }));
    body.querySelectorAll('[data-cart-remove]').forEach(el=>el.addEventListener('click', ()=>{
      posCart.splice(parseInt(el.dataset.cartRemove),1);
      renderInventoryBilling();
    }));
    body.querySelectorAll('[data-reprint]').forEach(el=>el.addEventListener('click', ()=>{
      printInvoiceChoiceModal(parseInt(el.dataset.reprint));
    }));
    body.querySelectorAll('[data-return-inv]').forEach(el=>el.addEventListener('click', ()=>{
      returnModal(parseInt(el.dataset.returnInv));
    }));

    document.getElementById('pos-generate').addEventListener('click', ()=>{
      if (!posCart.length) { toast('Cart me item add karein'); return; }
      for (const c of posCart) {
        if (c.qty > itemStock(c.itemId)) { toast(`Utna Stock available nahi hai! (${c.name})`); return; }
      }
      let customerName = '', studentId = null;
      if (posCustomerType==='student') {
        if (!posStudentPick) { toast('Valid student select karein'); return; }
        const s = students.find(x=>x.id===posStudentPick);
        customerName = s ? s.name : '';
        studentId = posStudentPick;
      } else {
        customerName = posCustomerName.trim() || 'Walk-in Customer';
      }
      const total = cartTotal();
      const received = cartReceived();
      const due = Math.max(0, total - received);
      const inv = {
        id: nextInvoiceId(), invNo: nextInvoiceNo(), date: todayISO(),
        customerType: posCustomerType, customerName, customerPhone: posCustomerPhone.trim(), studentId,
        items: posCart.map(c=>({ itemId:c.itemId, name:c.name, unit:c.unit, qty:c.qty, price:c.price })),
        discount: parseFloat(posDiscount)||0, paymentMode: posPaymentMode,
        amountReceived: received, dueBillId: null,
        createdBy: currentUserRole,
      };
      salesInvoices.push(inv);
      // AUTOMATION: auto stock-out for every sold item, no separate manual step needed
      inv.items.forEach(it=>{
        inventoryTxns.push({ id: Date.now()+Math.floor(Math.random()*1000), itemId: it.itemId, type:'out', qty: it.qty, date: inv.date,
          note: `Sale ${inv.invNo} — ${customerName}`, source:'sale', refId: inv.id, createdBy: currentUserRole });
      });
      saveInventoryTxns();
      // NOTE: agar student ka bill me due reh jaata hai to wo student ke main school bill (ledger) me add ho jaata hai
      if (due > 0 && studentId) {
        const s = students.find(x=>x.id===studentId);
        if (s) {
          if (!Array.isArray(s.bills)) s.bills = [];
          const billRec = { id: Date.now()+Math.floor(Math.random()*1000), type:'Stationery / Inventory', amount: due, date: inv.date,
            note: `Invoice ${inv.invNo} — baaki rakam` };
          s.bills.push(billRec);
          inv.dueBillId = billRec.id;
          saveStudents();
        }
      }
      saveSalesInvoices();
      toast(due>0 ? `Bill generated — ${fmt(due)} due main bill me jud gaya` : 'Bill generated — stock auto-updated');
      posCart = []; posDiscount = 0; posReceived = null; posCustomerName=''; posCustomerPhone=''; posStudentPick=null;
      printInvoiceChoiceModal(inv.id);
      renderInventoryBilling();
    });
  }

    if (!inv) { toast('Invoice nahi mila'); return; }
    function draw(){
      const rows = (inv.items||[]).map(it=>{
        const returnable = invoiceReturnableQty(inv, it);
        return { it, returnable };
      });
      modalRoot.innerHTML = `
        <div class="modal-backdrop" id="ekps-rtn-bg">
          <div class="modal">

                <div class="cart-row" style="align-items:center;">

                  <span class="cr-price">${fmt(r.it.price)}</span>
                </div>`).join('') : `<div class="empty-state">Is invoice me koi item nahi hai</div>`}
              <div class="field" style="margin-top:12px;"><label>Reason (optional)</label><input type="text" id="rtn-reason" placeholder="e.g. Galat size / Damaged"/></div>
              <div class="field"><label>Date</label><input type="date" id="rtn-date" value="${todayISO()}"/></div>
            </div>
            <div class="modal-foot">
              <span class="btn btn-ghost" id="ekps-rtn-cancel">Cancel</span>
              <span class="btn btn-primary" id="ekps-rtn-save">Process Return</span>
            </div>
          </div>
        </div>`;
      const close = ()=>{ modalRoot.innerHTML=''; };
      document.getElementById('ekps-rtn-bg').addEventListener('click', e=>{ if(e.target.id==='ekps-rtn-bg') close(); });
      document.getElementById('ekps-rtn-close').addEventListener('click', close);
      document.getElementById('ekps-rtn-cancel').addEventListener('click', close);
      document.getElementById('ekps-rtn-save').addEventListener('click', ()=>{
        const reason = document.getElementById('rtn-reason').value.trim();
        const date = document.getElementById('rtn-date').value || todayISO();
        let refundValue = 0, anyReturned = false;
        rows.forEach((r,idx)=>{
          const qtyEl = document.querySelector(`[data-rtn-qty="${idx}"]`);
          const qty = Math.min(r.returnable, Math.max(0, parseFloat(qtyEl.value)||0));
          if (qty > 0) {
            anyReturned = true;
            inventoryTxns.push({ id: Date.now()+Math.floor(Math.random()*1000), itemId: r.it.itemId, type:'in', qty, date,
              note: `Return — ${inv.invNo}${reason?' — '+reason:''}`, source:'return', refId: inv.id });
            refundValue += qty * r.it.price;
          }
        });
        if (!anyReturned) { toast('Return karne ke liye quantity daalein'); return; }
        saveInventoryTxns();
        // adjust student's due bill (if this invoice had left an outstanding balance on the main ledger)
        let msg = `Return processed — ${fmt(refundValue)} value`;
        if (inv.studentId && inv.dueBillId) {
          const s = students.find(x=>x.id===inv.studentId);
          if (s && Array.isArray(s.bills)) {
            const bill = s.bills.find(b=>b.id===inv.dueBillId);
            if (bill) {
              if (refundValue >= bill.amount) {
                const leftover = refundValue - bill.amount;
                s.bills = s.bills.filter(b=>b.id!==inv.dueBillId);
                saveStudents();
                msg = leftover>0 ? `Return processed — due bill hata di gayi, ${fmt(leftover)} cash refund karein` : `Return processed — due bill hata di gayi`;
              } else {
                bill.amount -= refundValue;
                saveStudents();
                msg = `Return processed — main bill me due ${fmt(bill.amount)} reh gaya`;
              }
            } else {
              msg = `Return processed — ${fmt(refundValue)} cash/adjust refund karein`;
            }
          }
        } else {
          msg = `Return processed — ${fmt(refundValue)} cash refund karein`;
        }
        toast(msg);
        close();
        renderInventory();
      });
    }
    draw();
  }

  // ================= REPORTING & EXPORT =================
  function exportRows(filename, rows, headers){
    if (typeof XLSX !== 'undefined') {
      const ws = XLSX.utils.json_to_sheet(rows, {header: headers});
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Report');
      XLSX.writeFile(wb, filename.replace(/\.csv$/,'') + '.xlsx');
    } else {
      const csvRows = [headers.join(',')].concat(rows.map(r=> headers.map(h=>{
        let v = r[h]==null?'':String(r[h]); if (v.includes(',')||v.includes('"')) v = '"'+v.replace(/"/g,'""')+'"'; return v;
      }).join(',')));
      const blob = new Blob([csvRows.join('\n')], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename.replace(/\.xlsx$/,'') + '.csv';
      document.body.appendChild(a); a.click(); a.remove();
    }
    toast('Report export ho gaya');
  }

    let digits = (mobNo||'').replace(/\D/g,'');
    if (!digits) return '';
    if (digits.length === 10) digits = '91' + digits; // default India country code
    return digits;

  // ---------- Multi-Level (Aging) Due Statement Generator ----------
  function downloadDueStatementPDF(){
    const list = students.filter(s => (totalDue(s) - totalPaid(s.id)) > 0)
      .sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);

    const classes = CLASS_ORDER.filter(c => list.some(s=>s.cls===c));
    let grand = { current:0, b1_2:0, b3_5:0, b6plus:0, otherCharges:0, total:0 };
    let bodyHtml = '';
    classes.forEach(cls=>{
      const clsStudents = list.filter(s=>s.cls===cls);
      let clsTotal = { current:0, b1_2:0, b3_5:0, b6plus:0, otherCharges:0, total:0 };
      const rows = clsStudents.map(s=>{
        const b = studentDueBuckets(s);

          <td class="r">${b.otherCharges?fmt(b.otherCharges):'—'}</td>
          <td class="r tot">${fmt(b.total)}</td>

      }).join('');
      Object.keys(grand).forEach(k=> grand[k]+=clsTotal[k]);
      bodyHtml += `
        <div class="cls-title">Class: ${esc(cls)} (${clsStudents.length} students)</div>
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Current Month</th><th>1&ndash;2 Months</th><th>3&ndash;5 Months</th><th>6+ Months</th><th>Other Charges</th><th>Total Due</th></tr></thead>

      @page { size: A4; margin: 10mm; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Arial, Helvetica, sans-serif; color:#1B2A4A; font-size:11px; }

      .top-sub { font-size:11px; text-align:center; color:#555; margin-bottom:14px; }
      .cls-title { font-size:12.5px; font-weight:700; margin:14px 0 6px 0; background:#EFEBDD; padding:5px 8px; border-radius:4px; }
      table { width:100%; border-collapse:collapse; margin-bottom:6px; }
      th, td { border:1px solid #ccc; padding:4px 6px; font-size:10.5px; }
      th { background:#1B2A4A; color:#fff; text-align:left; }
      td.r { text-align:right; font-family:monospace; }
      td.tot { font-weight:800; color:#C1502E; }
      tr.cls-sum { background:#FBF1DC; font-weight:700; }
      .grand { margin-top:16px; border-top:2px solid #1B2A4A; padding-top:8px; font-size:12px; font-weight:800; text-align:right; }

        Other Charges ${fmt(grand.otherCharges)} &nbsp;|&nbsp; Total: ${fmt(grand.total)}

  function exportExcel(){
    if (typeof XLSX === 'undefined') { toast('Excel library load nahi hui — internet check karein'); return; }
    const list = students.slice().sort((a,b)=> CLASS_ORDER.indexOf(a.cls)-CLASS_ORDER.indexOf(b.cls) || a.id-b.id);
    const rows = list.map(s=>{
      const due = totalDue(s), paid = totalPaid(s.id), rest = due-paid, st = statusOf(s);
      const row = {
        'ID': s.id,
        'Class': s.cls,
        'Name': s.name,
        'Mobile No': s.mobNo || '',
        'Monthly Fee': s.monthlyFee,
        'Total Due': due,
        'Total Paid': paid,
        'Rest Due': rest,
        'Status': st,
      };
      MONTHS.forEach(m => { row[m] = monthPaid(s.id, m); });
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:6},{wch:8},{wch:26},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10}].concat(MONTHS.map(()=>({wch:9})));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Fee Ledger');
    XLSX.writeFile(wb, `Fee_Ledger_${todayISO()}.xlsx`);
    toast('Excel file download ho rahi hai');
  }
